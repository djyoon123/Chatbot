<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>인사관리 FAQ 챗봇 (공유 데모)</title>
<style>
:root{
  --bg:#f4f6f9;--panel:#fff;--ink:#1f2933;--muted:#6b7280;
  --brand:#2563eb;--brand-weak:#e8f0fe;--line:#e5e7eb;--bad:#dc2626;--warn:#d97706;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI','Malgun Gothic',system-ui,sans-serif;background:var(--bg);color:var(--ink)}
header{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
header h1{font-size:17px;margin:0;font-weight:700}
.badge{margin-left:auto;font-size:12px;padding:5px 11px;border-radius:999px;background:#fef3c7;color:#92400e;font-weight:600;white-space:nowrap}
.wrap{max-width:820px;margin:0 auto;padding:18px}
.intro{font-size:13px;color:var(--muted);background:var(--brand-weak);border-radius:10px;padding:10px 14px;margin-bottom:14px}
.examples{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.chip{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:999px;padding:7px 12px;font-size:13px;cursor:pointer}
.chip:hover{border-color:var(--brand);color:var(--brand)}
#chat{display:flex;flex-direction:column;gap:14px;margin-bottom:96px}
.msg{display:flex}
.msg.user{justify-content:flex-end}
.bubble{max-width:85%;padding:10px 14px;border-radius:14px;line-height:1.6;font-size:14px;background:var(--brand);color:#fff;border-bottom-right-radius:4px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;max-width:100%}
.answer{padding:14px 16px;line-height:1.65;font-size:14px}
.answer table{border-collapse:collapse;width:100%;font-size:13px;margin:8px 0}
.answer th,.answer td{border:1px solid var(--line);padding:6px 8px;text-align:left}
.answer th{background:#f8fafc}
.answer p{margin:.4em 0}
.src{font-size:12px;color:var(--muted);padding:0 16px 12px}
.src b{color:var(--brand)}
details{border-top:1px solid var(--line)}
summary{cursor:pointer;padding:10px 16px;font-size:13px;font-weight:600;color:var(--muted);user-select:none}
summary:hover{color:var(--ink)}
.src-item{padding:8px 16px;border-top:1px dashed var(--line)}
.src-item .meta{color:var(--muted);font-size:12px;margin-bottom:4px}
.src-item pre{white-space:pre-wrap;word-break:break-word;margin:0;font-family:inherit;color:#374151;font-size:12.5px;max-height:200px;overflow:auto}
.note{font-size:12px;color:var(--muted);padding:0 16px 12px}
.kind-excerpt{background:#fffbeb;border-left:3px solid var(--warn);padding:8px 12px;font-size:12.5px;color:#92400e;margin:12px 16px 0;border-radius:6px}
form{position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--line);padding:12px}
.form-inner{max-width:820px;margin:0 auto;display:flex;gap:8px}
#q{flex:1;border:1px solid var(--line);border-radius:10px;padding:11px 14px;font-size:14px;outline:none}
#q:focus{border-color:var(--brand)}
button.send{background:var(--brand);color:#fff;border:0;border-radius:10px;padding:0 18px;font-size:14px;font-weight:600;cursor:pointer}
.loading{display:flex;gap:5px;align-items:center;color:var(--muted);font-size:13px;padding:13px 16px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:b 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes b{0%,60%,100%{opacity:.3}30%{opacity:1}}
</style>
</head>
<body>
<header>
  <h1>📋 인사관리 FAQ 챗봇</h1>
  <span class="badge">🟡 공유 데모 (오프라인)</span>
</header>
<div class="wrap">
  <div class="intro">이 데모는 설치·서버 없이 동작합니다. 인사규정·근로기준법 조문과 FAQ가 파일에 포함돼 있어, 브라우저에서 바로 질문·답변을 체험할 수 있습니다. (생성형 답변은 API 연결 버전에서 동작)</div>
  <div class="examples" id="examples"></div>
  <div id="chat"></div>
</div>
<form id="form">
  <div class="form-inner">
    <input id="q" placeholder="인사규정·근로기준법에 대해 물어보세요. 예) 연차휴가 며칠 발생해?" autocomplete="off">
    <button class="send" type="submit">전송</button>
  </div>
</form>
<script id="appdata" type="application/json">{"chunks": [{"doc": "법령/근로기준법.md", "heading": "(머리말)", "text": "# 근로기준법\n\n> [시행 2026. 8. 20.] [법률 제21373호, 2026. 2. 19., 타법개정]\n> 출처: 국가법령정보센터 (사내규정과 함께 준수해야 하는 상위 법령)"}, {"doc": "법령/근로기준법.md", "heading": "제1조 (목적)", "text": "### 제1조 (목적)\n이 법은 헌법에 따라 근로조건의 기준을 정함으로써 근로자의 기본적 생활을 보장, 향상시키며 균형 있는 국민경제의 발전을 꾀하는 것을 목적으로 한다."}, {"doc": "법령/근로기준법.md", "heading": "제2조 (정의)", "text": "### 제2조 (정의)\n① 이 법에서 사용하는 용어의 뜻은 다음과 같다. <개정 2018. 3. 20., 2019. 1. 15., 2020. 5. 26.>\n1. “근로자”란 직업의 종류와 관계없이 임금을 목적으로 사업이나 사업장에 근로를 제공하는 사람을 말한다.\n2. “사용자”란 사업주 또는 사업 경영 담당자, 그 밖에 근로자에 관한 사항에 대하여 사업주를 위하여 행위하는 자를 말한다.\n3. “근로”란 정신노동과 육체노동을 말한다.\n4. “근로계약”이란 근로자가 사용자에게 근로를 제공하고 사용자는 이에 대하여 임금을 지급하는 것을 목적으로 체결된 계약을 말한다.\n5. “임금”이란 사용자가 근로의 대가로 근로자에게 임금, 봉급, 그 밖에 어떠한 명칭으로든지 지급하는 모든 금품을 말한다.\n6. “평균임금”이란 이를 산정하여야 할 사유가 발생한 날 이전 3개월 동안에 그 근로자에게 지급된 임금의 총액을 그 기간의 총일수로 나눈 금액을 말한다. 근로자가 취업한 후 3개월 미만인 경우도 이에 준한다.\n7. “1주”란 휴일을 포함한 7일을 말한다.\n8. “소정(所定)근로시간”이란 제50조, 제69조 본문 또는 「산업안전보건법」 제139조제1항에 따른 근로시간의 범위에서 근로자와 사용자 사이에 정한 근로시간을 말한다.\n9. “단시간근로자”란 1주 동안의 소정근로시간이 그 사업장에서 같은 종류의 업무에 종사하는 통상 근로자의 1주 동안의 소정근로시간에 비하여 짧은 근로자를 말한다.\n② 제1항제6호에 따라 산출된 금액이 그 근로자의 통상임금보다 적으면 그 통상임금액을 평균임금으로 한다."}, {"doc": "법령/근로기준법.md", "heading": "제3조 (근로조건의 기준)", "text": "### 제3조 (근로조건의 기준)\n이 법에서 정하는 근로조건은 최저기준이므로 근로 관계 당사자는 이 기준을 이유로 근로조건을 낮출 수 없다."}, {"doc": "법령/근로기준법.md", "heading": "제4조 (근로조건의 결정)", "text": "### 제4조 (근로조건의 결정)\n근로조건은 근로자와 사용자가 동등한 지위에서 자유의사에 따라 결정하여야 한다."}, {"doc": "법령/근로기준법.md", "heading": "제5조 (근로조건의 준수)", "text": "### 제5조 (근로조건의 준수)\n근로자와 사용자는 각자가 단체협약, 취업규칙과 근로계약을 지키고 성실하게 이행할 의무가 있다."}, {"doc": "법령/근로기준법.md", "heading": "제6조 (균등한 처우)", "text": "### 제6조 (균등한 처우)\n사용자는 근로자에 대하여 남녀의 성(性)을 이유로 차별적 대우를 하지 못하고, 국적ㆍ신앙 또는 사회적 신분을 이유로 근로조건에 대한 차별적 처우를 하지 못한다."}, {"doc": "법령/근로기준법.md", "heading": "제7조 (강제 근로의 금지)", "text": "### 제7조 (강제 근로의 금지)\n사용자는 폭행, 협박, 감금, 그 밖에 정신상 또는 신체상의 자유를 부당하게 구속하는 수단으로써 근로자의 자유의사에 어긋나는 근로를 강요하지 못한다."}, {"doc": "법령/근로기준법.md", "heading": "제8조 (폭행의 금지)", "text": "### 제8조 (폭행의 금지)\n사용자는 사고의 발생이나 그 밖의 어떠한 이유로도 근로자에게 폭행을 하지 못한다."}, {"doc": "법령/근로기준법.md", "heading": "제9조 (중간착취의 배제)", "text": "### 제9조 (중간착취의 배제)\n누구든지 법률에 따르지 아니하고는 영리로 다른 사람의 취업에 개입하거나 중간인으로서 이익을 취득하지 못한다."}, {"doc": "법령/근로기준법.md", "heading": "제10조 (공민권 행사의 보장)", "text": "### 제10조 (공민권 행사의 보장)\n사용자는 근로자가 근로시간 중에 선거권, 그 밖의 공민권(公民權) 행사 또는 공(公)의 직무를 집행하기 위하여 필요한 시간을 청구하면 거부하지 못한다. 다만, 그 권리 행사나 공(公)의 직무를 수행하는 데에 지장이 없으면 청구한 시간을 변경할 수 있다."}, {"doc": "법령/근로기준법.md", "heading": "제11조 (적용 범위)", "text": "### 제11조 (적용 범위)\n① 이 법은 상시 5명 이상의 근로자를 사용하는 모든 사업 또는 사업장에 적용한다. 다만, 동거하는 친족만을 사용하는 사업 또는 사업장과 가사(家事) 사용인에 대하여는 적용하지 아니한다.\n② 상시 4명 이하의 근로자를 사용하는 사업 또는 사업장에 대하여는 대통령령으로 정하는 바에 따라 이 법의 일부 규정을 적용할 수 있다.\n③ 이 법을 적용하는 경우에 상시 사용하는 근로자 수를 산정하는 방법은 대통령령으로 정한다.<신설 2008. 3. 21.>"}, {"doc": "법령/근로기준법.md", "heading": "제12조 (적용 범위)", "text": "### 제12조 (적용 범위)\n이 법과 이 법에 따른 대통령령은 국가, 특별시ㆍ광역시ㆍ도, 시ㆍ군ㆍ구, 읍ㆍ면ㆍ동, 그 밖에 이에 준하는 것에 대하여도 적용된다."}, {"doc": "법령/근로기준법.md", "heading": "제13조 (보고, 출석의 의무)", "text": "### 제13조 (보고, 출석의 의무)\n사용자 또는 근로자는 이 법의 시행에 관하여 고용노동부장관ㆍ「노동위원회법」에 따른 노동위원회(이하 “노동위원회”라 한다) 또는 근로감독관의 요구가 있으면 지체 없이 필요한 사항에 대하여 보고하거나 출석하여야 한다. <개정 2010. 6. 4.>"}, {"doc": "법령/근로기준법.md", "heading": "제13조 (보고, 출석의 의무) [2026. 12. 8. 시행]", "text": "### 제13조 (보고, 출석의 의무) [2026. 12. 8. 시행]\n사용자 또는 근로자는 이 법의 시행에 관하여 고용노동부장관ㆍ「노동위원회법」에 따른 노동위원회(이하 “노동위원회”라 한다) 또는 「노동감독관 직무집행법」에 따른 노동감독관의 요구가 있으면 지체 없이 필요한 사항에 대하여 보고하거나 출석하여야 한다. <개정 2010. 6. 4., 2026. 4. 7.>\n[시행일: 2026. 12. 8.] 제13조"}, {"doc": "법령/근로기준법.md", "heading": "제14조 (법령 주요 내용 등의 게시)", "text": "### 제14조 (법령 주요 내용 등의 게시)\n① 사용자는 이 법과 이 법에 따른 대통령령의 주요 내용과 취업규칙을 근로자가 자유롭게 열람할 수 있는 장소에 항상 게시하거나 갖추어 두어 근로자에게 널리 알려야 한다. <개정 2021. 1. 5.>\n② 사용자는 제1항에 따른 대통령령 중 기숙사에 관한 규정과 제99조제1항에 따른 기숙사규칙을 기숙사에 게시하거나 갖추어 두어 기숙(寄宿)하는 근로자에게 널리 알려야 한다.\n[제목개정 2021. 1. 5.]"}, {"doc": "법령/근로기준법.md", "heading": "제15조 (이 법을 위반한 근로계약)", "text": "### 제15조 (이 법을 위반한 근로계약)\n① 이 법에서 정하는 기준에 미치지 못하는 근로조건을 정한 근로계약은 그 부분에 한정하여 무효로 한다. <개정 2020. 5. 26.>\n② 제1항에 따라 무효로 된 부분은 이 법에서 정한 기준에 따른다."}, {"doc": "법령/근로기준법.md", "heading": "제16조 (계약기간)", "text": "### 제16조 (계약기간)\n근로계약은 기간을 정하지 아니한 것과 일정한 사업의 완료에 필요한 기간을 정한 것 외에는 그 기간은 1년을 초과하지 못한다.\n[법률 제8372호(2007. 4. 11.) 제16조의 개정규정은 같은 법 부칙 제3조의 규정에 의하여 2007년 6월 30일까지 유효함]"}, {"doc": "법령/근로기준법.md", "heading": "제17조 (근로조건의 명시)", "text": "### 제17조 (근로조건의 명시)\n① 사용자는 근로계약을 체결할 때에 근로자에게 다음 각 호의 사항을 명시하여야 한다. 근로계약 체결 후 다음 각 호의 사항을 변경하는 경우에도 또한 같다. <개정 2010. 5. 25.>\n1. 임금\n2. 소정근로시간\n3. 제55조에 따른 휴일\n4. 제60조에 따른 연차 유급휴가\n5. 그 밖에 대통령령으로 정하는 근로조건\n② 사용자는 제1항제1호와 관련한 임금의 구성항목ㆍ계산방법ㆍ지급방법 및 제2호부터 제4호까지의 사항이 명시된 서면(「전자문서 및 전자거래 기본법」 제2조제1호에 따른 전자문서를 포함한다)을 근로자에게 교부하여야 한다. 다만, 본문에 따른 사항이 단체협약 또는 취업규칙의 변경 등 대통령령으로 정하는 사유로 인하여 변경되는 경우에는 근로자의 요구가 있으면 그 근로자에게 교부하여야 한다.<신설 2010. 5. 25., 2021. 1. 5.>"}, {"doc": "법령/근로기준법.md", "heading": "제18조 (단시간근로자의 근로조건)", "text": "### 제18조 (단시간근로자의 근로조건)\n① 단시간근로자의 근로조건은 그 사업장의 같은 종류의 업무에 종사하는 통상 근로자의 근로시간을 기준으로 산정한 비율에 따라 결정되어야 한다.\n② 제1항에 따라 근로조건을 결정할 때에 기준이 되는 사항이나 그 밖에 필요한 사항은 대통령령으로 정한다.\n③ 4주 동안(4주 미만으로 근로하는 경우에는 그 기간)을 평균하여 1주 동안의 소정근로시간이 15시간 미만인 근로자에 대하여는 제55조와 제60조를 적용하지 아니한다.<개정 2008. 3. 21.>"}, {"doc": "법령/근로기준법.md", "heading": "제19조 (근로조건의 위반)", "text": "### 제19조 (근로조건의 위반)\n① 제17조에 따라 명시된 근로조건이 사실과 다를 경우에 근로자는 근로조건 위반을 이유로 손해의 배상을 청구할 수 있으며 즉시 근로계약을 해제할 수 있다.\n② 제1항에 따라 근로자가 손해배상을 청구할 경우에는 노동위원회에 신청할 수 있으며, 근로계약이 해제되었을 경우에는 사용자는 취업을 목적으로 거주를 변경하는 근로자에게 귀향 여비를 지급하여야 한다."}, {"doc": "법령/근로기준법.md", "heading": "제20조 (위약 예정의 금지)", "text": "### 제20조 (위약 예정의 금지)\n사용자는 근로계약 불이행에 대한 위약금 또는 손해배상액을 예정하는 계약을 체결하지 못한다."}, {"doc": "법령/근로기준법.md", "heading": "제21조 (전차금 상계의 금지)", "text": "### 제21조 (전차금 상계의 금지)\n사용자는 전차금(前借金)이나 그 밖에 근로할 것을 조건으로 하는 전대(前貸)채권과 임금을 상계하지 못한다."}, {"doc": "법령/근로기준법.md", "heading": "제22조 (강제 저금의 금지)", "text": "### 제22조 (강제 저금의 금지)\n① 사용자는 근로계약에 덧붙여 강제 저축 또는 저축금의 관리를 규정하는 계약을 체결하지 못한다.\n② 사용자가 근로자의 위탁으로 저축을 관리하는 경우에는 다음 각 호의 사항을 지켜야 한다.\n1. 저축의 종류ㆍ기간 및 금융기관을 근로자가 결정하고, 근로자 본인의 이름으로 저축할 것\n2. 근로자가 저축증서 등 관련 자료의 열람 또는 반환을 요구할 때에는 즉시 이에 따를 것"}, {"doc": "법령/근로기준법.md", "heading": "제23조 (해고 등의 제한)", "text": "### 제23조 (해고 등의 제한)\n① 사용자는 근로자에게 정당한 이유 없이 해고, 휴직, 정직, 전직, 감봉, 그 밖의 징벌(懲罰)(이하 “부당해고등”이라 한다)을 하지 못한다.\n② 사용자는 근로자가 업무상 부상 또는 질병의 요양을 위하여 휴업한 기간과 그 후 30일 동안 또는 산전(産前)ㆍ산후(産後)의 여성이 이 법에 따라 휴업한 기간과 그 후 30일 동안은 해고하지 못한다. 다만, 사용자가 제84조에 따라 일시보상을 하였을 경우 또는 사업을 계속할 수 없게 된 경우에는 그러하지 아니하다."}, {"doc": "법령/근로기준법.md", "heading": "제24조 (경영상 이유에 의한 해고의 제한)", "text": "### 제24조 (경영상 이유에 의한 해고의 제한)\n① 사용자가 경영상 이유에 의하여 근로자를 해고하려면 긴박한 경영상의 필요가 있어야 한다. 이 경우 경영 악화를 방지하기 위한 사업의 양도ㆍ인수ㆍ합병은 긴박한 경영상의 필요가 있는 것으로 본다.\n② 제1항의 경우에 사용자는 해고를 피하기 위한 노력을 다하여야 하며, 합리적이고 공정한 해고의 기준을 정하고 이에 따라 그 대상자를 선정하여야 한다. 이 경우 남녀의 성을 이유로 차별하여서는 아니 된다.\n③ 사용자는 제2항에 따른 해고를 피하기 위한 방법과 해고의 기준 등에 관하여 그 사업 또는 사업장에 근로자의 과반수로 조직된 노동조합이 있는 경우에는 그 노동조합(근로자의 과반수로 조직된 노동조합이 없는 경우에는 근로자의 과반수를 대표하는 자를 말한다. 이하 “근로자대표”라 한다)에 해고를 하려는 날의 50일 전까지 통보하고 성실하게 협의하여야 한다.\n④ 사용자는 제1항에 따라 대통령령으로 정하는 일정한 규모 이상의 인원을 해고하려면 대통령령으로 정하는 바에 따라 고용노동부장관에게 신고하여야 한다.<개정 2010. 6. 4.>\n⑤ 사용자가 제1항부터 제3항까지의 규정에 따른 요건을 갖추어 근로자를 해고한 경우에는 제23조제1항에 따른 정당한 이유가 있는 해고를 한 것으로 본다."}, {"doc": "법령/근로기준법.md", "heading": "제25조 (우선 재고용 등)", "text": "### 제25조 (우선 재고용 등)\n① 제24조에 따라 근로자를 해고한 사용자는 근로자를 해고한 날부터 3년 이내에 해고된 근로자가 해고 당시 담당하였던 업무와 같은 업무를 할 근로자를 채용하려고 할 경우 제24조에 따라 해고된 근로자가 원하면 그 근로자를 우선적으로 고용하여야 한다.\n② 정부는 제24조에 따라 해고된 근로자에 대하여 생계안정, 재취업, 직업훈련 등 필요한 조치를 우선적으로 취하여야 한다."}, {"doc": "법령/근로기준법.md", "heading": "제26조 (해고의 예고)", "text": "### 제26조 (해고의 예고)\n사용자는 근로자를 해고(경영상 이유에 의한 해고를 포함한다)하려면 적어도 30일 전에 예고를 하여야 하고, 30일 전에 예고를 하지 아니하였을 때에는 30일분 이상의 통상임금을 지급하여야 한다. 다만, 다음 각 호의 어느 하나에 해당하는 경우에는 그러하지 아니하다. <개정 2010. 6. 4., 2019. 1. 15.>\n1. 근로자가 계속 근로한 기간이 3개월 미만인 경우\n2. 천재ㆍ사변, 그 밖의 부득이한 사유로 사업을 계속하는 것이 불가능한 경우\n3. 근로자가 고의로 사업에 막대한 지장을 초래하거나 재산상 손해를 끼친 경우로서 고용노동부령으로 정하는 사유에 해당하는 경우"}, {"doc": "법령/근로기준법.md", "heading": "제27조 (해고사유 등의 서면통지)", "text": "### 제27조 (해고사유 등의 서면통지)\n① 사용자는 근로자를 해고하려면 해고사유와 해고시기를 서면으로 통지하여야 한다.\n② 근로자에 대한 해고는 제1항에 따라 서면으로 통지하여야 효력이 있다.\n③ 사용자가 제26조에 따른 해고의 예고를 해고사유와 해고시기를 명시하여 서면으로 한 경우에는 제1항에 따른 통지를 한 것으로 본다.<신설 2014. 3. 24.>"}, {"doc": "법령/근로기준법.md", "heading": "제28조 (부당해고등의 구제신청)", "text": "### 제28조 (부당해고등의 구제신청)\n① 사용자가 근로자에게 부당해고등을 하면 근로자는 노동위원회에 구제를 신청할 수 있다.\n② 제1항에 따른 구제신청은 부당해고등이 있었던 날부터 3개월 이내에 하여야 한다."}, {"doc": "법령/근로기준법.md", "heading": "제29조 (조사 등)", "text": "### 제29조 (조사 등)\n① 노동위원회는 제28조에 따른 구제신청을 받으면 지체 없이 필요한 조사를 하여야 하며 관계 당사자를 심문하여야 한다.\n② 노동위원회는 제1항에 따라 심문을 할 때에는 관계 당사자의 신청이나 직권으로 증인을 출석하게 하여 필요한 사항을 질문할 수 있다.\n③ 노동위원회는 제1항에 따라 심문을 할 때에는 관계 당사자에게 증거 제출과 증인에 대한 반대심문을 할 수 있는 충분한 기회를 주어야 한다.\n④ 제1항에 따른 노동위원회의 조사와 심문에 관한 세부절차는 「노동위원회법」에 따른 중앙노동위원회(이하 “중앙노동위원회”라 한다)가 정하는 바에 따른다."}, {"doc": "법령/근로기준법.md", "heading": "제30조 (구제명령 등)", "text": "### 제30조 (구제명령 등)\n① 노동위원회는 제29조에 따른 심문을 끝내고 부당해고등이 성립한다고 판정하면 사용자에게 구제명령을 하여야 하며, 부당해고등이 성립하지 아니한다고 판정하면 구제신청을 기각하는 결정을 하여야 한다.\n② 제1항에 따른 판정, 구제명령 및 기각결정은 사용자와 근로자에게 각각 서면으로 통지하여야 한다.\n③ 노동위원회는 제1항에 따른 구제명령(해고에 대한 구제명령만을 말한다)을 할 때에 근로자가 원직복직(原職復職)을 원하지 아니하면 원직복직을 명하는 대신 근로자가 해고기간 동안 근로를 제공하였더라면 받을 수 있었던 임금 상당액 이상의 금품을 근로자에게 지급하도록 명할 수 있다.\n④ 노동위원회는 근로계약기간의 만료, 정년의 도래 등으로 근로자가 원직복직(해고 이외의 경우는 원상회복을 말한다)이 불가능한 경우에도 제1항에 따른 구제명령이나 기각결정을 하여야 한다. 이 경우 노동위원회는 부당해고등이 성립한다고 판정하면 근로자가 해고기간 동안 근로를 제공하였더라면 받을 수 있었던 임금 상당액에 해당하는 금품(해고 이외의 경우에는 원상회복에 준하는 금품을 말한다)을 사업주가 근로자에게 지급하도록 명할 수 있다.<신설 2021. 5. 18.>"}, {"doc": "법령/근로기준법.md", "heading": "제31조 (구제명령 등의 확정)", "text": "### 제31조 (구제명령 등의 확정)\n① 「노동위원회법」에 따른 지방노동위원회의 구제명령이나 기각결정에 불복하는 사용자나 근로자는 구제명령서나 기각결정서를 통지받은 날부터 10일 이내에 중앙노동위원회에 재심을 신청할 수 있다.\n② 제1항에 따른 중앙노동위원회의 재심판정에 대하여 사용자나 근로자는 재심판정서를 송달받은 날부터 15일 이내에 「행정소송법」의 규정에 따라 소(訴)를 제기할 수 있다.\n③ 제1항과 제2항에 따른 기간 이내에 재심을 신청하지 아니하거나 행정소송을 제기하지 아니하면 그 구제명령, 기각결정 또는 재심판정은 확정된다."}, {"doc": "법령/근로기준법.md", "heading": "제32조 (구제명령 등의 효력)", "text": "### 제32조 (구제명령 등의 효력)\n노동위원회의 구제명령, 기각결정 또는 재심판정은 제31조에 따른 중앙노동위원회에 대한 재심 신청이나 행정소송 제기에 의하여 그 효력이 정지되지 아니한다."}, {"doc": "법령/근로기준법.md", "heading": "제33조 (이행강제금)", "text": "### 제33조 (이행강제금)\n① 노동위원회는 구제명령(구제명령을 내용으로 하는 재심판정을 포함한다. 이하 이 조에서 같다)을 받은 후 이행기한까지 구제명령을 이행하지 아니한 사용자에게 3천만원 이하의 이행강제금을 부과한다. <개정 2021. 5. 18.>\n② 노동위원회는 제1항에 따른 이행강제금을 부과하기 30일 전까지 이행강제금을 부과ㆍ징수한다는 뜻을 사용자에게 미리 문서로써 알려 주어야 한다.\n③ 제1항에 따른 이행강제금을 부과할 때에는 이행강제금의 액수, 부과 사유, 납부기한, 수납기관, 이의제기방법 및 이의제기기관 등을 명시한 문서로써 하여야 한다.\n④ 제1항에 따라 이행강제금을 부과하는 위반행위의 종류와 위반 정도에 따른 금액, 부과ㆍ징수된 이행강제금의 반환절차, 그 밖에 필요한 사항은 대통령령으로 정한다.\n⑤ 노동위원회는 최초의 구제명령을 한 날을 기준으로 매년 2회의 범위에서 구제명령이 이행될 때까지 반복하여 제1항에 따른 이행강제금을 부과ㆍ징수할 수 있다. 이 경우 이행강제금은 2년을 초과하여 부과ㆍ징수하지 못한다.\n⑥ 노동위원회는 구제명령을 받은 자가 구제명령을 이행하면 새로운 이행강제금을 부과하지 아니하되, 구제명령을 이행하기 전에 이미 부과된 이행강제금은 징수하여야 한다.\n⑦ 노동위원회는 이행강제금 납부의무자가 납부기한까지 이행강제금을 내지 아니하면 기간을 정하여 독촉을 하고 지정된 기간에 제1항에 따른 이행강제금을 내지 아니하면 국세 체납처분의 예에 따라 징수할 수 있다.\n⑧ 근로자는 구제명령을 받은 사용자가 이행기한까지 구제명령을 이행하지 아니하면 이행기한이 지난 때부터 15일 이내에 그 사실을 노동위원회에 알려줄 수 있다."}, {"doc": "법령/근로기준법.md", "heading": "제34조 (퇴직급여 제도)", "text": "### 제34조 (퇴직급여 제도)\n사용자가 퇴직하는 근로자에게 지급하는 퇴직급여 제도에 관하여는 「근로자퇴직급여 보장법」이 정하는 대로 따른다.\n\n제35조 삭제 <2019. 1. 15.>\n[2019. 1. 15. 법률 제16270호에 의하여 2015. 12. 23. 헌법재판소에서 위헌 결정된 이 조를 삭제함.]"}, {"doc": "법령/근로기준법.md", "heading": "제36조 (금품 청산)", "text": "### 제36조 (금품 청산)\n사용자는 근로자가 사망 또는 퇴직한 경우에는 그 지급 사유가 발생한 때부터 14일 이내에 임금, 보상금, 그 밖의 모든 금품을 지급하여야 한다. 다만, 특별한 사정이 있을 경우에는 당사자 사이의 합의에 의하여 기일을 연장할 수 있다. <개정 2020. 5. 26.>"}, {"doc": "법령/근로기준법.md", "heading": "제37조 (미지급 임금에 대한 지연이자)", "text": "### 제37조 (미지급 임금에 대한 지연이자)\n① 사용자는 다음 각 호의 어느 하나에 해당하는 임금의 전부 또는 일부를 각 호에 따른 날까지 지급하지 아니한 경우 그 다음 날부터 지급하는 날까지의 지연 일수에 대하여 연 100분의 40 이내의 범위에서 「은행법」에 따른 은행이 적용하는 연체금리 등 경제 여건을 고려하여 대통령령으로 정하는 이율에 따른 지연이자를 지급하여야 한다. <개정 2010. 5. 17., 2024. 10. 22.>\n1. 제36조에 따라 지급하여야 하는 임금 및 「근로자퇴직급여 보장법」 제2조제5호에 따른 급여(일시금만 해당된다): 지급 사유가 발생한 날부터 14일이 되는 날\n2. 제43조에 따라 지급하여야 하는 임금: 제43조제2항에 따라 정하는 날\n② 사용자가 제1항제2호에 따른 임금을 지급하지 아니하여 지연이자를 지급할 의무가 발생한 이후 근로자가 사망 또는 퇴직한 경우 해당 임금에 대한 지연이자는 제1항제2호에 따른 날을 기준으로 산정한다.<신설 2024. 10. 22.>\n③ 제1항은 사용자가 천재ㆍ사변, 그 밖에 대통령령으로 정하는 사유에 따라 임금 지급을 지연하는 경우 그 사유가 존속하는 기간에 대하여는 적용하지 아니한다.<개정 2024. 10. 22.>"}, {"doc": "법령/근로기준법.md", "heading": "제38조 (임금채권의 우선변제)", "text": "### 제38조 (임금채권의 우선변제)\n① 임금, 재해보상금, 그 밖에 근로 관계로 인한 채권은 사용자의 총재산에 대하여 질권(質權)ㆍ저당권 또는 「동산ㆍ채권 등의 담보에 관한 법률」에 따른 담보권에 따라 담보된 채권 외에는 조세ㆍ공과금 및 다른 채권에 우선하여 변제되어야 한다. 다만, 질권ㆍ저당권 또는 「동산ㆍ채권 등의 담보에 관한 법률」에 따른 담보권에 우선하는 조세ㆍ공과금에 대하여는 그러하지 아니하다. <개정 2010. 6. 10.>\n② 제1항에도 불구하고 다음 각 호의 어느 하나에 해당하는 채권은 사용자의 총재산에 대하여 질권ㆍ저당권 또는 「동산ㆍ채권 등의 담보에 관한 법률」에 따른 담보권에 따라 담보된 채권, 조세ㆍ공과금 및 다른 채권에 우선하여 변제되어야 한다.<개정 2010. 6. 10.>\n1. 최종 3개월분의 임금\n2. 재해보상금"}, {"doc": "법령/근로기준법.md", "heading": "제39조 (사용증명서)", "text": "### 제39조 (사용증명서)\n① 사용자는 근로자가 퇴직한 후라도 사용 기간, 업무 종류, 지위와 임금, 그 밖에 필요한 사항에 관한 증명서를 청구하면 사실대로 적은 증명서를 즉시 내주어야 한다.\n② 제1항의 증명서에는 근로자가 요구한 사항만을 적어야 한다."}, {"doc": "법령/근로기준법.md", "heading": "제40조 (취업 방해의 금지)", "text": "### 제40조 (취업 방해의 금지)\n누구든지 근로자의 취업을 방해할 목적으로 비밀 기호 또는 명부를 작성ㆍ사용하거나 통신을 하여서는 아니 된다."}, {"doc": "법령/근로기준법.md", "heading": "제41조 (근로자의 명부)", "text": "### 제41조 (근로자의 명부)\n① 사용자는 각 사업장별로 근로자 명부를 작성하고 근로자의 성명, 생년월일, 이력, 그 밖에 대통령령으로 정하는 사항을 적어야 한다. 다만, 대통령령으로 정하는 일용근로자에 대해서는 근로자 명부를 작성하지 아니할 수 있다. <개정 2021. 1. 5.>\n② 제1항에 따라 근로자 명부에 적을 사항이 변경된 경우에는 지체 없이 정정하여야 한다."}, {"doc": "법령/근로기준법.md", "heading": "제42조 (계약 서류의 보존)", "text": "### 제42조 (계약 서류의 보존)\n사용자는 근로자 명부와 대통령령으로 정하는 근로계약에 관한 중요한 서류를 3년간 보존하여야 한다."}, {"doc": "법령/근로기준법.md", "heading": "제43조 (임금 지급)", "text": "### 제43조 (임금 지급)\n① 임금은 통화(通貨)로 직접 근로자에게 그 전액을 지급하여야 한다. 다만, 법령 또는 단체협약에 특별한 규정이 있는 경우에는 임금의 일부를 공제하거나 통화 이외의 것으로 지급할 수 있다.\n② 임금은 매월 1회 이상 일정한 날짜를 정하여 지급하여야 한다. 다만, 임시로 지급하는 임금, 수당, 그 밖에 이에 준하는 것 또는 대통령령으로 정하는 임금에 대하여는 그러하지 아니하다."}, {"doc": "법령/근로기준법.md", "heading": "제43조의2 (체불사업주 명단 공개)", "text": "### 제43조의2 (체불사업주 명단 공개)\n① 고용노동부장관은 제36조, 제43조, 제51조의3, 제52조제2항제2호, 제56조에 따른 임금, 보상금, 수당, 「근로자퇴직급여 보장법」 제12조제1항에 따른 퇴직급여등, 그 밖의 모든 금품(이하 “임금등”이라 한다)을 지급하지 아니한 사업주(법인인 경우에는 그 대표자를 포함한다. 이하 “체불사업주”라 한다)가 명단 공개 기준일 이전 3년 이내 임금등을 체불하여 2회 이상 유죄가 확정된 자로서 명단 공개 기준일 이전 1년 이내 임금등의 체불총액이 3천만원 이상인 경우에는 그 인적사항 등을 공개할 수 있다. 다만, 체불사업주의 사망ㆍ폐업으로 명단 공개의 실효성이 없는 경우 등 대통령령으로 정하는 사유가 있는 경우에는 그러하지 아니하다. <개정 2020. 5. 26., 2021. 1. 5., 2024. 10. 22.>\n② 고용노동부장관은 제1항에 따라 명단 공개를 할 경우에 체불사업주에게 3개월 이상의 기간을 정하여 소명 기회를 주어야 한다.\n③ 제1항에 따른 체불사업주의 인적사항 등에 대한 공개 여부 및 제43조의4에 따른 상습체불사업주에 관한 사항을 심의하기 위하여 고용노동부에 임금체불정보심의위원회(이하 이 조 및 제43조의4에서 “위원회”라 한다)를 둔다. 이 경우 위원회의 구성ㆍ운영 등 필요한 사항은 고용노동부령으로 정한다.<개정 2024. 10. 22.>\n④ 위원회 위원 중 공무원이 아닌 사람은 「형법」 제127조 및 제129조부터 제132조까지를 적용할 때에는 공무원으로 본다.<신설 2024. 10. 22.>\n⑤ 제1항에 따른 명단 공개의 구체적인 내용, 기간 및 방법 등 명단 공개에 필요한 사항은 대통령령으로 정한다.<개정 2024. 10. 22.>\n[본조신설 2012. 2. 1.]"}, {"doc": "법령/근로기준법.md", "heading": "제43조의3 (임금등 체불자료의 제공)", "text": "### 제43조의3 (임금등 체불자료의 제공)\n① 고용노동부장관은 「신용정보의 이용 및 보호에 관한 법률」 제25조제2항제1호에 따른 종합신용정보집중기관이 다음 각 호의 어느 하나에 해당하는 체불사업주의 인적사항과 체불액 등에 관한 자료(이하 “임금등 체불자료”라 한다)를 요구할 때에는 임금등의 체불을 예방하기 위하여 필요하다고 인정하는 경우에 그 자료를 제공할 수 있다. 다만, 체불사업주의 사망ㆍ폐업으로 임금등 체불자료 제공의 실효성이 없는 경우 등 대통령령으로 정하는 사유가 있는 경우에는 그러하지 아니하다. <개정 2024. 10. 22.>\n1. 임금등 체불자료 제공일 이전 3년 이내 임금등을 체불하여 2회 이상 유죄가 확정된 자로서 임금등 체불자료 제공일 이전 1년 이내 임금등의 체불총액이 2천만원 이상인 체불사업주\n2. 제43조의4에 따른 상습체불사업주\n② 제1항에 따라 임금등 체불자료를 받은 자는 이를 체불사업주의 신용도ㆍ신용거래능력 판단과 관련한 업무 외의 목적으로 이용하거나 누설하여서는 아니 된다.\n③ 제1항에 따른 임금등 체불자료의 제공 절차 및 방법 등 임금등 체불자료의 제공에 필요한 사항은 대통령령으로 정한다.\n[본조신설 2012. 2. 1.]"}, {"doc": "법령/근로기준법.md", "heading": "제43조의4 (상습체불사업주에 대한 보조ㆍ지원 제한 등)", "text": "### 제43조의4 (상습체불사업주에 대한 보조ㆍ지원 제한 등)\n① 고용노동부장관은 위원회의 심의를 거쳐 다음 각 호의 어느 하나에 해당하는 자(법인인 경우에는 그 대표자를 포함한다)를 상습체불사업주(이하 “상습체불사업주”라 한다)로 정할 수 있다.\n1. 임금등 체불자료 제공일이 속하는 연도의 직전 연도 1년간 근로자에게 임금등(「근로자퇴직급여 보장법」 제12조제1항에 따른 퇴직급여등은 제외한다)을 3개월분 임금 이상 체불한 사업주\n2. 임금등 체불자료 제공일이 속하는 연도의 직전 연도 1년간 근로자에게 5회 이상 임금등을 체불하고, 체불총액이 3천만원 이상인 사업주\n② 고용노동부장관은 제1항에 따라 상습체불사업주로 정할 경우에 해당 사업주에게 3개월 이상의 기간을 정하여 소명 기회를 주어야 한다.\n③ 고용노동부장관은 중앙행정기관의 장, 지방자치단체의 장 또는 대통령령으로 정하는 공공기관의 장(이하 “중앙행정기관장등”이라 한다)에게 상습체불사업주에 대하여 다음 각 호의 조치를 하도록 요청하고 임금등 체불자료를 제공할 수 있으며, 중앙행정기관장등이 다음 각 호의 조치를 목적으로 상습체불사업주의 임금등 체불자료를 요청하는 경우 해당 자료를 제공할 수 있다.\n1. 「보조금 관리에 관한 법률」, 「지방자치단체 보조금 관리에 관한 법률」 또는 개별 법률에 따른 각종 보조ㆍ지원사업의 참여 배제나 수급 제한\n2. 「국가를 당사자로 하는 계약에 관한 법률」 또는 「지방자치단체를 당사자로 하는 계약에 관한 법률」에 따른 입찰참가자격 사전심사나 낙찰자 심사ㆍ결정 시 감점 등 불이익 조치\n④ 제3항에 따라 상습체불사업주의 임금등 체불자료를 제공받은 자는 제공받은 자료를 제3항 각 호에서 정한 목적 외의 목적으로 이용하거나 누설하여서는 아니 된다.\n⑤ 제3항에 따른 임금등 체불자료의 제공 절차 및 방법은 제43조의3제1항 단서 및 같은 조 제3항을 준용한다.\n⑥ 그 밖에 제1항제1호에 따른 3개월분 임금의 산정, 같은 항 제2호에 따른 임금등의 체불횟수 산정, 제2항에 따른 소명 기회 제공 및 제3항에 따라 제공되는 임금등 체불자료의 제공기간 등에 필요한 사항은 대통령령으로 정한다.\n[본조신설 2024. 10. 22.]"}, {"doc": "법령/근로기준법.md", "heading": "제43조의5 (업무위탁 등)", "text": "### 제43조의5 (업무위탁 등)\n① 고용노동부장관은 제43조의2부터 제43조의4까지에 관한 업무를 효율적으로 하기 위하여 대통령령으로 정하는 바에 따라 업무 중 일부를 「산업재해보상보험법」 제10조에 따른 근로복지공단(이하 “근로복지공단”이라 한다)이나 전문성을 갖춘 연구기관ㆍ법인ㆍ단체에 위탁할 수 있다.\n② 제1항에 따라 위탁받은 기관의 임직원은 「형법」 제129조부터 제132조까지를 적용할 때에는 공무원으로 본다.\n[본조신설 2024. 10. 22.]"}, {"doc": "법령/근로기준법.md", "heading": "제43조의6 (체불사업주 명단공개 등을 위한 자료제공 등의 요청)", "text": "### 제43조의6 (체불사업주 명단공개 등을 위한 자료제공 등의 요청)\n① 고용노동부장관은 제43조의2에 따른 체불사업주 명단 공개, 제43조의3에 따른 임금등 체불자료의 제공, 제43조의4에 따른 상습체불사업주에 대한 중앙행정기관장등의 보조 및 지원 제한 등에 관한 업무를 수행하기 위하여 다음 각 호의 어느 하나에 해당하는 자료의 제공 또는 관계 전산망의 이용(이하 “자료제공등”이라 한다)을 해당 각 호의 자에게 각각 요청할 수 있다.\n1. 법원행정처장에게 체불사업주의 법인등기사항증명서\n2. 국세청장에게 체불사업주의 「소득세법」 제4조제1항제1호에 따른 종합소득에 관한 자료, 「법인세법」 제4조제1항제1호에 따른 소득에 관한 자료, 「부가가치세법」 제8조, 「법인세법」 제111조 및 「소득세법」 제168조에 따른 사업자등록에 관한 자료\n3. 국세청장에게 임금등이 체불된 근로자의 「소득세법」 제4조제1항제1호에 따른 종합소득에 관한 자료\n4. 근로복지공단에 임금등이 체불된 근로자의 「고용보험 및 산업재해보상보험의 보험료징수 등에 관한 법률」 제16조의3에 따른 월평균보수에 관한 자료, 「고용보험법」 제13조 및 제15조에 따른 피보험자격 취득에 관한 자료 및 체불사업주의 「임금채권보장법」 제7조, 제7조의2 및 제8조에 따른 대지급금에 관한 자료\n② 고용노동부장관은 제1항제4호에 따른 월평균보수 및 피보험자격 취득에 관한 자료를 제공받기 위하여 해당 근로자의 임금, 근로제공기간 등 대통령령으로 정하는 정보를 근로복지공단에 제공할 수 있다.\n③ 제1항에 따라 자료제공등을 요청받은 자는 정당한 사유가 없으면 그 요청에 따라야 한다.\n[본조신설 2024. 10. 22.]"}, {"doc": "법령/근로기준법.md", "heading": "제43조의6 (체불사업주 명단공개 등을 위한 자료제공 등의 요청) [2027. 1. 1. 시행]", "text": "### 제43조의6 (체불사업주 명단공개 등을 위한 자료제공 등의 요청) [2027. 1. 1. 시행]\n① 고용노동부장관은 제43조의2에 따른 체불사업주 명단 공개, 제43조의3에 따른 임금등 체불자료의 제공, 제43조의4에 따른 상습체불사업주에 대한 중앙행정기관장등의 보조 및 지원 제한 등에 관한 업무를 수행하기 위하여 다음 각 호의 어느 하나에 해당하는 자료의 제공 또는 관계 전산망의 이용(이하 “자료제공등”이라 한다)을 해당 각 호의 자에게 각각 요청할 수 있다. <개정 2026. 3. 17.>\n1. 법원행정처장에게 체불사업주의 법인등기사항증명서\n2. 국세청장에게 체불사업주의 「소득세법」 제4조제1항제1호에 따른 종합소득에 관한 자료, 「법인세법」 제4조제1항제1호에 따른 소득에 관한 자료, 「부가가치세법」 제8조, 「법인세법」 제111조 및 「소득세법」 제168조에 따른 사업자등록에 관한 자료\n3. 국세청장에게 임금등이 체불된 근로자의 「소득세법」 제4조제1항제1호에 따른 종합소득에 관한 자료\n4. 근로복지공단에 임금등이 체불된 근로자의 「고용보험 및 산업재해보상보험의 보험료징수 등에 관한 법률」 제16조의3에 따른 월 보수에 관한 자료, 「고용보험법」 제13조 및 제15조에 따른 피보험자격 취득에 관한 자료 및 체불사업주의 「임금채권보장법」 제7조, 제7조의2 및 제8조에 따른 대지급금에 관한 자료\n② 고용노동부장관은 제1항제4호에 따른 월 보수 및 피보험자격 취득에 관한 자료를 제공받기 위하여 해당 근로자의 임금, 근로제공기간 등 대통령령으로 정하는 정보를 근로복지공단에 제공할 수 있다.<개정 2026. 3. 17.>\n③ 제1항에 따라 자료제공등을 요청받은 자는 정당한 사유가 없으면 그 요청에 따라야 한다.\n[본조신설 2024. 10. 22.]\n[시행일: 2027. 1. 1.] 제43조의6"}, {"doc": "법령/근로기준법.md", "heading": "제43조의7 (출국금지)", "text": "### 제43조의7 (출국금지)\n① 고용노동부장관은 제43조의2에 따라 명단이 공개된 체불사업주에 대하여 법무부장관에게 「출입국관리법」 제4조제3항에 따라 출국금지를 요청할 수 있다.\n② 법무부장관은 제1항의 요청에 따라 출국금지를 한 경우 고용노동부장관에게 그 결과를 정보통신망 등을 통하여 통보하여야 한다.\n③ 고용노동부장관은 체불임금의 지급 등으로 출국금지 사유가 없어진 경우 즉시 법무부장관에게 출국금지의 해제를 요청하여야 한다.\n④ 제1항부터 제3항까지에서 규정한 사항 외에 출국금지 및 그 해제의 요청 등의 절차에 필요한 사항은 대통령령으로 정한다.\n[본조신설 2024. 10. 22.]"}, {"doc": "법령/근로기준법.md", "heading": "제43조의8 (체불 임금등에 대한 손해배상청구)", "text": "### 제43조의8 (체불 임금등에 대한 손해배상청구)\n① 근로자는 사업주가 다음 각 호의 어느 하나에 해당하는 경우 법원에 사업주가 지급하여야 하는 임금등의 3배 이내의 금액을 지급할 것을 청구할 수 있다.\n1. 명백한 고의로 임금등(「근로자퇴직급여 보장법」 제2조제5호의 급여는 제외한다. 이하 이 조에서 같다)의 전부 또는 일부를 지급하지 아니한 경우\n2. 1년 동안 임금등의 전부 또는 일부를 지급하지 아니한 개월 수가 총 3개월 이상인 경우\n3. 지급하지 아니한 임금등의 총액이 3개월 이상의 통상임금에 해당하는 경우\n② 법원은 제1항에 따른 금액을 결정할 때에 다음 각 호의 사항을 고려하여야 한다.\n1. 임금등의 체불 기간ㆍ경위ㆍ횟수 및 체불된 임금등의 규모\n2. 사업주가 임금등을 지급하기 위하여 노력한 정도\n3. 제37조에 따른 지연이자 지급액\n4. 사업주의 재산상태\n[본조신설 2024. 10. 22.]"}, {"doc": "법령/근로기준법.md", "heading": "제44조 (도급 사업에 대한 임금 지급)", "text": "### 제44조 (도급 사업에 대한 임금 지급)\n① 사업이 한 차례 이상의 도급에 따라 행하여지는 경우에 하수급인(下受給人)(도급이 한 차례에 걸쳐 행하여진 경우에는 수급인을 말한다)이 직상(直上) 수급인(도급이 한 차례에 걸쳐 행하여진 경우에는 도급인을 말한다)의 귀책사유로 근로자에게 임금을 지급하지 못한 경우에는 그 직상 수급인은 그 하수급인과 연대하여 책임을 진다. 다만, 직상 수급인의 귀책사유가 그 상위 수급인의 귀책사유에 의하여 발생한 경우에는 그 상위 수급인도 연대하여 책임을 진다. <개정 2012. 2. 1., 2020. 3. 31.>\n② 제1항의 귀책사유 범위는 대통령령으로 정한다.<개정 2012. 2. 1.>"}, {"doc": "법령/근로기준법.md", "heading": "제44조의2 (건설업에서의 임금 지급 연대책임)", "text": "### 제44조의2 (건설업에서의 임금 지급 연대책임)\n① 건설업에서 사업이 2차례 이상 「건설산업기본법」 제2조제11호에 따른 도급(이하 “공사도급”이라 한다)이 이루어진 경우에 같은 법 제2조제7호에 따른 건설사업자가 아닌 하수급인이 그가 사용한 근로자에게 임금(해당 건설공사에서 발생한 임금으로 한정한다)을 지급하지 못한 경우에는 그 직상 수급인은 하수급인과 연대하여 하수급인이 사용한 근로자의 임금을 지급할 책임을 진다. <개정 2011. 5. 24., 2019. 4. 30.>\n② 제1항의 직상 수급인이 「건설산업기본법」 제2조제7호에 따른 건설사업자가 아닌 때에는 그 상위 수급인 중에서 최하위의 같은 호에 따른 건설사업자를 직상 수급인으로 본다.<개정 2011. 5. 24., 2019. 4. 30.>\n[본조신설 2007. 7. 27.]"}, {"doc": "법령/근로기준법.md", "heading": "제44조의3 (건설업의 공사도급에 있어서의 임금에 관한 특례)", "text": "### 제44조의3 (건설업의 공사도급에 있어서의 임금에 관한 특례)\n① 공사도급이 이루어진 경우로서 다음 각 호의 어느 하나에 해당하는 때에는 직상 수급인은 하수급인에게 지급하여야 하는 하도급 대금 채무의 부담 범위에서 그 하수급인이 사용한 근로자가 청구하면 하수급인이 지급하여야 하는 임금(해당 건설공사에서 발생한 임금으로 한정한다)에 해당하는 금액을 근로자에게 직접 지급하여야 한다.\n1. 직상 수급인이 하수급인을 대신하여 하수급인이 사용한 근로자에게 지급하여야 하는 임금을 직접 지급할 수 있다는 뜻과 그 지급방법 및 절차에 관하여 직상 수급인과 하수급인이 합의한 경우\n2. 「민사집행법」 제56조제3호에 따른 확정된 지급명령, 하수급인의 근로자에게 하수급인에 대하여 임금채권이 있음을 증명하는 같은 법 제56조제4호에 따른 집행증서,「소액사건심판법」 제5조의7에 따라 확정된 이행권고결정, 그 밖에 이에 준하는 집행권원이 있는 경우\n3. 하수급인이 그가 사용한 근로자에 대하여 지급하여야 할 임금채무가 있음을 직상 수급인에게 알려주고, 직상 수급인이 파산 등의 사유로 하수급인이 임금을 지급할 수 없는 명백한 사유가 있다고 인정하는 경우\n② 「건설산업기본법」 제2조제10호에 따른 발주자의 수급인(이하 “원수급인”이라 한다)으로부터 공사도급이 2차례 이상 이루어진 경우로서 하수급인(도급받은 하수급인으로부터 재하도급 받은 하수급인을 포함한다. 이하 이 항에서 같다)이 사용한 근로자에게 그 하수급인에 대한 제1항제2호에 따른 집행권원이 있는 경우에는 근로자는 하수급인이 지급하여야 하는 임금(해당 건설공사에서 발생한 임금으로 한정한다)에 해당하는 금액을 원수급인에게 직접 지급할 것을 요구할 수 있다. 원수급인은 근로자가 자신에 대하여 「민법」 제404조에 따른 채권자대위권을 행사할 수 있는 금액의 범위에서 이에 따라야 한다.<개정 2011. 5. 24.>\n③ 직상 수급인 또는 원수급인이 제1항 및 제2항에 따라 하수급인이 사용한 근로자에게 임금에 해당하는 금액을 지급한 경우에는 하수급인에 대한 하도급 대금 채무는 그 범위에서 소멸한 것으로 본다.\n[본조신설 2007. 7. 27.]"}, {"doc": "법령/근로기준법.md", "heading": "제44조의4 (도급 사업에서 임금비용의 구분지급) [2027. 1. 1. 시행]", "text": "### 제44조의4 (도급 사업에서 임금비용의 구분지급) [2027. 1. 1. 시행]\n① 다음 각 호의 어느 하나에 해당하는 도급인은 대통령령으로 정하는 업종, 금액 규모 및 기간에 해당하는 사업을 도급하는 경우 그 도급금액 중 수급인이 자신의 근로자에게 지급하여야 할 임금에 해당하는 비용(이하 “임금비용”이라 한다)을 구분하여 매월 지급하여야 한다.\n1. 국가\n2. 지방자치단체\n3. 「공공기관의 운영에 관한 법률」 제5조에 따른 공공기관\n4. 「지방공기업법」 제49조에 따른 지방공사 및 같은 법 제76조에 따른 지방공단\n5. 「지방자치단체 출자ㆍ출연 기관의 운영에 관한 법률」 제2조에 따른 출자기관 또는 출연기관\n6. 그 밖에 제1호부터 제5호까지에 해당하지 않는 도급인\n② 제1항에 따른 사업이 한 차례 이상의 도급에 따라 행하여지는 경우 직상 수급인과 하수급인을 각각 도급인과 수급인으로 본다.\n③ 제1항에 따라 임금비용을 구분하여 지급하여야 하는 도급인이 고용노동부장관이 지정하는 금융기관에 임금비용을 예치하는 때에는 해당 임금비용을 수급인에게 지급한 것으로 본다.\n④ 도급인이 제1항에 따라 임금비용을 구분하여 지급하는 때에는 수급인이 전월(前月)[임금비용을 최초로 지급한 월(月)의 전월은 제외한다]에 자신의 근로자에게 임금을 지급하였는지를 확인하여야 한다. 이 경우 수급인은 도급인에게 전월 임금 지급내역 등 고용노동부령으로 정하는 자료를 도급인이 정하는 방법에 따라 제출하여야 한다.\n⑤ 도급인이 제4항에 따라 임금 지급 여부를 확인한 결과 수급인이 자신의 근로자에게 임금을 지급하지 아니한 경우에는 그 사실을 고용노동부장관에게 통보하여야 한다.\n⑥ 수급인은 제1항에 따라 지급받은 임금비용을 자신의 근로자에 대한 임금 지급 이외의 다른 용도로 사용하여서는 아니 된다.\n⑦ 제1항부터 제6항까지에 따른 임금비용의 구분지급, 임금 지급 여부의 확인, 고용노동부장관에 대한 통보 방법 및 절차 등에 필요한 사항은 고용노동부령으로 정한다.\n[본조신설 2026. 4. 7.]\n[시행일: 2027. 1. 1.] 제44조의4"}, {"doc": "법령/근로기준법.md", "heading": "제45조 (비상시 지급)", "text": "### 제45조 (비상시 지급)\n사용자는 근로자가 출산, 질병, 재해, 그 밖에 대통령령으로 정하는 비상(非常)한 경우의 비용에 충당하기 위하여 임금 지급을 청구하면 지급기일 전이라도 이미 제공한 근로에 대한 임금을 지급하여야 한다."}, {"doc": "법령/근로기준법.md", "heading": "제46조 (휴업수당)", "text": "### 제46조 (휴업수당)\n① 사용자의 귀책사유로 휴업하는 경우에 사용자는 휴업기간 동안 그 근로자에게 평균임금의 100분의 70 이상의 수당을 지급하여야 한다. 다만, 평균임금의 100분의 70에 해당하는 금액이 통상임금을 초과하는 경우에는 통상임금을 휴업수당으로 지급할 수 있다.\n② 제1항에도 불구하고 부득이한 사유로 사업을 계속하는 것이 불가능하여 노동위원회의 승인을 받은 경우에는 제1항의 기준에 못 미치는 휴업수당을 지급할 수 있다."}, {"doc": "법령/근로기준법.md", "heading": "제47조 (도급 근로자)", "text": "### 제47조 (도급 근로자)\n사용자는 도급이나 그 밖에 이에 준하는 제도로 사용하는 근로자에게 근로시간에 따라 일정액의 임금을 보장하여야 한다."}, {"doc": "법령/근로기준법.md", "heading": "제48조 (임금대장 및 임금명세서)", "text": "### 제48조 (임금대장 및 임금명세서)\n① 사용자는 각 사업장별로 임금대장을 작성하고 임금과 가족수당 계산의 기초가 되는 사항, 임금액, 그 밖에 대통령령으로 정하는 사항을 임금을 지급할 때마다 적어야 한다. <개정 2021. 5. 18.>\n② 사용자는 임금을 지급하는 때에는 근로자에게 임금의 구성항목ㆍ계산방법, 제43조제1항 단서에 따라 임금의 일부를 공제한 경우의 내역 등 대통령령으로 정하는 사항을 적은 임금명세서를 서면(「전자문서 및 전자거래 기본법」 제2조제1호에 따른 전자문서를 포함한다)으로 교부하여야 한다.<신설 2021. 5. 18.>\n[제목개정 2021. 5. 18.]"}, {"doc": "법령/근로기준법.md", "heading": "제49조 (임금의 시효)", "text": "### 제49조 (임금의 시효)\n이 법에 따른 임금채권은 3년간 행사하지 아니하면 시효로 소멸한다."}, {"doc": "법령/근로기준법.md", "heading": "제50조 (근로시간)", "text": "### 제50조 (근로시간)\n① 1주 간의 근로시간은 휴게시간을 제외하고 40시간을 초과할 수 없다.\n② 1일의 근로시간은 휴게시간을 제외하고 8시간을 초과할 수 없다.\n③ 제1항 및 제2항에 따라 근로시간을 산정하는 경우 작업을 위하여 근로자가 사용자의 지휘ㆍ감독 아래에 있는 대기시간 등은 근로시간으로 본다.<신설 2012. 2. 1., 2020. 5. 26.>"}, {"doc": "법령/근로기준법.md", "heading": "제51조 (3개월 이내의 탄력적 근로시간제)", "text": "### 제51조 (3개월 이내의 탄력적 근로시간제)\n① 사용자는 취업규칙(취업규칙에 준하는 것을 포함한다)에서 정하는 바에 따라 2주 이내의 일정한 단위기간을 평균하여 1주 간의 근로시간이 제50조제1항의 근로시간을 초과하지 아니하는 범위에서 특정한 주에 제50조제1항의 근로시간을, 특정한 날에 제50조제2항의 근로시간을 초과하여 근로하게 할 수 있다. 다만, 특정한 주의 근로시간은 48시간을 초과할 수 없다.\n② 사용자는 근로자대표와의 서면 합의에 따라 다음 각 호의 사항을 정하면 3개월 이내의 단위기간을 평균하여 1주 간의 근로시간이 제50조제1항의 근로시간을 초과하지 아니하는 범위에서 특정한 주에 제50조제1항의 근로시간을, 특정한 날에 제50조제2항의 근로시간을 초과하여 근로하게 할 수 있다. 다만, 특정한 주의 근로시간은 52시간을, 특정한 날의 근로시간은 12시간을 초과할 수 없다.\n1. 대상 근로자의 범위\n2. 단위기간(3개월 이내의 일정한 기간으로 정하여야 한다)\n3. 단위기간의 근로일과 그 근로일별 근로시간\n4. 그 밖에 대통령령으로 정하는 사항\n③ 제1항과 제2항은 15세 이상 18세 미만의 근로자와 임신 중인 여성 근로자에 대하여는 적용하지 아니한다.\n④ 사용자는 제1항 및 제2항에 따라 근로자를 근로시킬 경우에는 기존의 임금 수준이 낮아지지 아니하도록 임금보전방안(賃金補塡方案)을 강구하여야 한다.\n[제목개정 2021. 1. 5.]"}, {"doc": "법령/근로기준법.md", "heading": "제51조의2 (3개월을 초과하는 탄력적 근로시간제)", "text": "### 제51조의2 (3개월을 초과하는 탄력적 근로시간제)\n① 사용자는 근로자대표와의 서면 합의에 따라 다음 각 호의 사항을 정하면 3개월을 초과하고 6개월 이내의 단위기간을 평균하여 1주간의 근로시간이 제50조제1항의 근로시간을 초과하지 아니하는 범위에서 특정한 주에 제50조제1항의 근로시간을, 특정한 날에 제50조제2항의 근로시간을 초과하여 근로하게 할 수 있다. 다만, 특정한 주의 근로시간은 52시간을, 특정한 날의 근로시간은 12시간을 초과할 수 없다.\n1. 대상 근로자의 범위\n2. 단위기간(3개월을 초과하고 6개월 이내의 일정한 기간으로 정하여야 한다)\n3. 단위기간의 주별 근로시간\n4. 그 밖에 대통령령으로 정하는 사항\n② 사용자는 제1항에 따라 근로자를 근로시킬 경우에는 근로일 종료 후 다음 근로일 개시 전까지 근로자에게 연속하여 11시간 이상의 휴식 시간을 주어야 한다. 다만, 천재지변 등 대통령령으로 정하는 불가피한 경우에는 근로자대표와의 서면 합의가 있으면 이에 따른다.\n③ 사용자는 제1항제3호에 따른 각 주의 근로일이 시작되기 2주 전까지 근로자에게 해당 주의 근로일별 근로시간을 통보하여야 한다.\n④ 사용자는 제1항에 따른 근로자대표와의 서면 합의 당시에는 예측하지 못한 천재지변, 기계 고장, 업무량 급증 등 불가피한 사유가 발생한 때에는 제1항제2호에 따른 단위기간 내에서 평균하여 1주간의 근로시간이 유지되는 범위에서 근로자대표와의 협의를 거쳐 제1항제3호의 사항을 변경할 수 있다. 이 경우 해당 근로자에게 변경된 근로일이 개시되기 전에 변경된 근로일별 근로시간을 통보하여야 한다.\n⑤ 사용자는 제1항에 따라 근로자를 근로시킬 경우에는 기존의 임금 수준이 낮아지지 아니하도록 임금항목을 조정 또는 신설하거나 가산임금 지급 등의 임금보전방안(賃金補塡方案)을 마련하여 고용노동부장관에게 신고하여야 한다. 다만, 근로자대표와의 서면합의로 임금보전방안을 마련한 경우에는 그러하지 아니하다.\n⑥ 제1항부터 제5항까지의 규정은 15세 이상 18세 미만의 근로자와 임신 중인 여성 근로자에 대해서는 적용하지 아니한다.\n[본조신설 2021. 1. 5.]"}, {"doc": "법령/근로기준법.md", "heading": "제51조의3 (근로한 기간이 단위기간보다 짧은 경우의 임금 정산)", "text": "### 제51조의3 (근로한 기간이 단위기간보다 짧은 경우의 임금 정산)\n사용자는 제51조 및 제51조의2에 따른 단위기간 중 근로자가 근로한 기간이 그 단위기간보다 짧은 경우에는 그 단위기간 중 해당 근로자가 근로한 기간을 평균하여 1주간에 40시간을 초과하여 근로한 시간 전부에 대하여 제56조제1항에 따른 가산임금을 지급하여야 한다.\n[본조신설 2021. 1. 5.]"}, {"doc": "법령/근로기준법.md", "heading": "제52조 (선택적 근로시간제)", "text": "### 제52조 (선택적 근로시간제)\n① 사용자는 취업규칙(취업규칙에 준하는 것을 포함한다)에 따라 업무의 시작 및 종료 시각을 근로자의 결정에 맡기기로 한 근로자에 대하여 근로자대표와의 서면 합의에 따라 다음 각 호의 사항을 정하면 1개월(신상품 또는 신기술의 연구개발 업무의 경우에는 3개월로 한다) 이내의 정산기간을 평균하여 1주간의 근로시간이 제50조제1항의 근로시간을 초과하지 아니하는 범위에서 1주 간에 제50조제1항의 근로시간을, 1일에 제50조제2항의 근로시간을 초과하여 근로하게 할 수 있다. <개정 2021. 1. 5.>\n1. 대상 근로자의 범위(15세 이상 18세 미만의 근로자는 제외한다)\n2. 정산기간\n3. 정산기간의 총 근로시간\n4. 반드시 근로하여야 할 시간대를 정하는 경우에는 그 시작 및 종료 시각\n5. 근로자가 그의 결정에 따라 근로할 수 있는 시간대를 정하는 경우에는 그 시작 및 종료 시각\n6. 그 밖에 대통령령으로 정하는 사항\n② 사용자는 제1항에 따라 1개월을 초과하는 정산기간을 정하는 경우에는 다음 각 호의 조치를 하여야 한다.<신설 2021. 1. 5.>\n1. 근로일 종료 후 다음 근로일 시작 전까지 근로자에게 연속하여 11시간 이상의 휴식 시간을 줄 것. 다만, 천재지변 등 대통령령으로 정하는 불가피한 경우에는 근로자대표와의 서면 합의가 있으면 이에 따른다.\n2. 매 1개월마다 평균하여 1주간의 근로시간이 제50조제1항의 근로시간을 초과한 시간에 대해서는 통상임금의 100분의 50 이상을 가산하여 근로자에게 지급할 것. 이 경우 제56조제1항은 적용하지 아니한다."}, {"doc": "법령/근로기준법.md", "heading": "제53조 (연장 근로의 제한)", "text": "### 제53조 (연장 근로의 제한)\n① 당사자 간에 합의하면 1주 간에 12시간을 한도로 제50조의 근로시간을 연장할 수 있다.\n② 당사자 간에 합의하면 1주 간에 12시간을 한도로 제51조 및 제51조의2의 근로시간을 연장할 수 있고, 제52조제1항제2호의 정산기간을 평균하여 1주 간에 12시간을 초과하지 아니하는 범위에서 제52조제1항의 근로시간을 연장할 수 있다.<개정 2021. 1. 5.>\n③ 상시 30명 미만의 근로자를 사용하는 사용자는 다음 각 호에 대하여 근로자대표와 서면으로 합의한 경우 제1항 또는 제2항에 따라 연장된 근로시간에 더하여 1주 간에 8시간을 초과하지 아니하는 범위에서 근로시간을 연장할 수 있다.<신설 2018. 3. 20.>\n1. 제1항 또는 제2항에 따라 연장된 근로시간을 초과할 필요가 있는 사유 및 그 기간\n2. 대상 근로자의 범위\n④ 사용자는 특별한 사정이 있으면 고용노동부장관의 인가와 근로자의 동의를 받아 제1항과 제2항의 근로시간을 연장할 수 있다. 다만, 사태가 급박하여 고용노동부장관의 인가를 받을 시간이 없는 경우에는 사후에 지체 없이 승인을 받아야 한다.<개정 2010. 6. 4., 2018. 3. 20.>\n⑤ 고용노동부장관은 제4항에 따른 근로시간의 연장이 부적당하다고 인정하면 그 후 연장시간에 상당하는 휴게시간이나 휴일을 줄 것을 명할 수 있다.<개정 2010. 6. 4., 2018. 3. 20.>\n⑥ 제3항은 15세 이상 18세 미만의 근로자에 대하여는 적용하지 아니한다.<신설 2018. 3. 20.>\n⑦ 사용자는 제4항에 따라 연장 근로를 하는 근로자의 건강 보호를 위하여 건강검진 실시 또는 휴식시간 부여 등 고용노동부장관이 정하는 바에 따라 적절한 조치를 하여야 한다.<신설 2021. 1. 5.>\n[법률 제15513호(2018. 3. 20.) 제53조제3항, 제53조제6항의 개정규정은 같은 법 부칙 제2조의 규정에 의하여 2022년 12월 31일까지 유효함]"}, {"doc": "법령/근로기준법.md", "heading": "제54조 (휴게)", "text": "### 제54조 (휴게)\n① 사용자는 근로시간이 4시간인 경우에는 30분 이상, 8시간인 경우에는 1시간 이상의 휴게시간을 근로시간 도중에 주어야 한다.\n② 휴게시간은 근로자가 자유롭게 이용할 수 있다."}, {"doc": "법령/근로기준법.md", "heading": "제54조 (휴게) [2026. 12. 10. 시행]", "text": "### 제54조 (휴게) [2026. 12. 10. 시행]\n① 사용자는 근로시간이 4시간인 경우에는 30분 이상, 8시간인 경우에는 1시간 이상의 휴게시간을 근로시간 도중에 주어야 한다. 다만, 근로시간이 4시간인 경우로서 근로자가 휴게시간을 이용하지 아니할 것을 명시적으로 요청한 때에는 그러하지 아니하다. <개정 2026. 6. 9.>\n② 휴게시간은 근로자가 자유롭게 이용할 수 있다.\n[시행일: 2026. 12. 10.] 제54조"}, {"doc": "법령/근로기준법.md", "heading": "제55조 (휴일)", "text": "### 제55조 (휴일)\n① 사용자는 근로자에게 1주에 평균 1회 이상의 유급휴일을 보장하여야 한다. <개정 2018. 3. 20.>\n② 사용자는 근로자에게 대통령령으로 정하는 휴일을 유급으로 보장하여야 한다. 다만, 근로자대표와 서면으로 합의한 경우 특정한 근로일로 대체할 수 있다.<신설 2018. 3. 20.>\n[시행일] 제55조제2항의 개정규정은 다음 각 호의 구분에 따른 날부터 시행한다.\n1. 상시 300명 이상의 근로자를 사용하는 사업 또는 사업장, 「공공기관의 운영에 관한 법률」 제4조에 따른 공공기관, 「지방공기업법」 제49조 및 같은 법 제76조에 따른 지방공사 및 지방공단, 국가ㆍ지방자치단체 또는 정부투자기관이 자본금의 2분의 1 이상을 출자하거나 기본재산의 2분의 1 이상을 출연한 기관ㆍ단체와 그 기관ㆍ단체가 자본금의 2분의 1 이상을 출자하거나 기본재산의 2분의 1 이상을 출연한 기관ㆍ단체, 국가 및 지방자치단체의 기관: 2020년 1월 1일\n2. 상시 30명 이상 300명 미만의 근로자를 사용하는 사업 또는 사업장: 2021년 1월 1일\n3. 상시 5인 이상 30명 미만의 근로자를 사용하는 사업 또는 사업장: 2022년 1월 1일"}, {"doc": "법령/근로기준법.md", "heading": "제56조 (연장ㆍ야간 및 휴일 근로)", "text": "### 제56조 (연장ㆍ야간 및 휴일 근로)\n① 사용자는 연장근로(제53조ㆍ제59조 및 제69조 단서에 따라 연장된 시간의 근로를 말한다)에 대하여는 통상임금의 100분의 50 이상을 가산하여 근로자에게 지급하여야 한다. <개정 2018. 3. 20.>\n② 제1항에도 불구하고 사용자는 휴일근로에 대하여는 다음 각 호의 기준에 따른 금액 이상을 가산하여 근로자에게 지급하여야 한다.<신설 2018. 3. 20.>\n1. 8시간 이내의 휴일근로: 통상임금의 100분의 50\n2. 8시간을 초과한 휴일근로: 통상임금의 100분의 100\n③ 사용자는 야간근로(오후 10시부터 다음 날 오전 6시 사이의 근로를 말한다)에 대하여는 통상임금의 100분의 50 이상을 가산하여 근로자에게 지급하여야 한다.<신설 2018. 3. 20.>"}, {"doc": "법령/근로기준법.md", "heading": "제57조 (보상 휴가제)", "text": "### 제57조 (보상 휴가제)\n사용자는 근로자대표와의 서면 합의에 따라 제51조의3, 제52조제2항제2호 및 제56조에 따른 연장근로ㆍ야간근로 및 휴일근로 등에 대하여 임금을 지급하는 것을 갈음하여 휴가를 줄 수 있다. <개정 2021. 1. 5.>"}, {"doc": "법령/근로기준법.md", "heading": "제58조 (근로시간 계산의 특례)", "text": "### 제58조 (근로시간 계산의 특례)\n① 근로자가 출장이나 그 밖의 사유로 근로시간의 전부 또는 일부를 사업장 밖에서 근로하여 근로시간을 산정하기 어려운 경우에는 소정근로시간을 근로한 것으로 본다. 다만, 그 업무를 수행하기 위하여 통상적으로 소정근로시간을 초과하여 근로할 필요가 있는 경우에는 그 업무의 수행에 통상 필요한 시간을 근로한 것으로 본다.\n② 제1항 단서에도 불구하고 그 업무에 관하여 근로자대표와의 서면 합의를 한 경우에는 그 합의에서 정하는 시간을 그 업무의 수행에 통상 필요한 시간으로 본다.\n③ 업무의 성질에 비추어 업무 수행 방법을 근로자의 재량에 위임할 필요가 있는 업무로서 대통령령으로 정하는 업무는 사용자가 근로자대표와 서면 합의로 정한 시간을 근로한 것으로 본다. 이 경우 그 서면 합의에는 다음 각 호의 사항을 명시하여야 한다.\n1. 대상 업무\n2. 사용자가 업무의 수행 수단 및 시간 배분 등에 관하여 근로자에게 구체적인 지시를 하지 아니한다는 내용\n3. 근로시간의 산정은 그 서면 합의로 정하는 바에 따른다는 내용\n④ 제1항과 제3항의 시행에 필요한 사항은 대통령령으로 정한다."}, {"doc": "법령/근로기준법.md", "heading": "제59조 (근로시간 및 휴게시간의 특례)", "text": "### 제59조 (근로시간 및 휴게시간의 특례)\n① 「통계법」 제22조제1항에 따라 국가데이터처장이 고시하는 산업에 관한 표준의 중분류 또는 소분류 중 다음 각 호의 어느 하나에 해당하는 사업에 대하여 사용자가 근로자대표와 서면으로 합의한 경우에는 제53조제1항에 따른 주(週) 12시간을 초과하여 연장근로를 하게 하거나 제54조에 따른 휴게시간을 변경할 수 있다. <개정 2025. 10. 1.>\n1. 육상운송 및 파이프라인 운송업. 다만, 「여객자동차 운수사업법」 제3조제1항제1호에 따른 노선(路線) 여객자동차운송사업은 제외한다.\n2. 수상운송업\n3. 항공운송업\n4. 기타 운송관련 서비스업\n5. 보건업\n② 제1항의 경우 사용자는 근로일 종료 후 다음 근로일 개시 전까지 근로자에게 연속하여 11시간 이상의 휴식 시간을 주어야 한다.\n[전문개정 2018. 3. 20.]"}, {"doc": "법령/근로기준법.md", "heading": "제60조 (연차 유급휴가)", "text": "### 제60조 (연차 유급휴가)\n① 사용자는 1년간 80퍼센트 이상 출근한 근로자에게 15일의 유급휴가를 주어야 한다. <개정 2012. 2. 1.>\n② 사용자는 계속하여 근로한 기간이 1년 미만인 근로자 또는 1년간 80퍼센트 미만 출근한 근로자에게 1개월 개근 시 1일의 유급휴가를 주어야 한다.<개정 2012. 2. 1.>\n③ 삭제<2017. 11. 28.>\n④ 사용자는 3년 이상 계속하여 근로한 근로자에게는 제1항에 따른 휴가에 최초 1년을 초과하는 계속 근로 연수 매 2년에 대하여 1일을 가산한 유급휴가를 주어야 한다. 이 경우 가산휴가를 포함한 총 휴가 일수는 25일을 한도로 한다.\n⑤ 사용자는 제1항부터 제4항까지의 규정에 따른 휴가를 근로자가 청구한 시기에 주어야 하고, 그 기간에 대하여는 취업규칙 등에서 정하는 통상임금 또는 평균임금을 지급하여야 한다. 다만, 근로자가 청구한 시기에 휴가를 주는 것이 사업 운영에 막대한 지장이 있는 경우에는 그 시기를 변경할 수 있다.\n⑥ 제1항 및 제2항을 적용하는 경우 다음 각 호의 어느 하나에 해당하는 기간은 출근한 것으로 본다.<개정 2012. 2. 1., 2017. 11. 28., 2024. 10. 22., 2026. 2. 19.>\n1. 근로자가 업무상의 부상 또는 질병으로 휴업한 기간\n2. 임신 중의 여성이 제74조제1항부터 제3항까지의 규정에 따른 휴가로 휴업한 기간\n3. 「남녀고용평등과 일ㆍ가정 양립 지원에 관한 법률」 제19조에 따른 육아휴직으로 휴업한 기간\n4. 「남녀고용평등과 일ㆍ가정 양립 지원에 관한 법률」 제19조의2제1항에 따른 육아기 근로시간 단축을 사용하여 단축된 근로시간\n5. 제74조제7항에 따른 임신기 근로시간 단축을 사용하여 단축된 근로시간\n⑦ 제1항ㆍ제2항 및 제4항에 따른 휴가는 1년간(계속하여 근로한 기간이 1년 미만인 근로자의 제2항에 따른 유급휴가는 최초 1년의 근로가 끝날 때까지의 기간을 말한다) 행사하지 아니하면 소멸된다. 다만, 사용자의 귀책사유로 사용하지 못한 경우에는 그러하지 아니하다.<개정 2020. 3. 31.>"}, {"doc": "법령/근로기준법.md", "heading": "제60조 (연차 유급휴가) [2027. 6. 10. 시행]", "text": "### 제60조 (연차 유급휴가) [2027. 6. 10. 시행]\n① 사용자는 1년간 80퍼센트 이상 출근한 근로자에게 15일의 유급휴가를 주어야 한다. <개정 2012. 2. 1.>\n② 사용자는 계속하여 근로한 기간이 1년 미만인 근로자 또는 1년간 80퍼센트 미만 출근한 근로자에게 1개월 개근 시 1일의 유급휴가를 주어야 한다.<개정 2012. 2. 1.>\n③ 삭제<2017. 11. 28.>\n④ 사용자는 3년 이상 계속하여 근로한 근로자에게는 제1항에 따른 휴가에 최초 1년을 초과하는 계속 근로 연수 매 2년에 대하여 1일을 가산한 유급휴가를 주어야 한다. 이 경우 가산휴가를 포함한 총 휴가 일수는 25일을 한도로 한다.\n⑤ 사용자는 근로자가 제1항ㆍ제2항 및 제4항에 따른 유급휴가를 대통령령으로 정하는 시간단위 및 일수의 범위에서 분할하여 청구한 때에는 이를 부여하여야 한다.<신설 2026. 6. 9.>\n⑥ 사용자는 제1항ㆍ제2항ㆍ제4항 및 제5항에 따른 휴가를 근로자가 청구한 시기에 주어야 하고, 그 기간에 대하여는 취업규칙 등에서 정하는 통상임금 또는 평균임금을 지급하여야 한다. 다만, 근로자가 청구한 시기에 휴가를 주는 것이 사업 운영에 막대한 지장이 있는 경우에는 그 시기를 변경할 수 있다.<개정 2026. 6. 9.>\n⑦ 제1항 및 제2항을 적용하는 경우 다음 각 호의 어느 하나에 해당하는 기간은 출근한 것으로 본다.<개정 2012. 2. 1., 2017. 11. 28., 2024. 10. 22., 2026. 2. 19., 2026. 6. 9.>\n1. 근로자가 업무상의 부상 또는 질병으로 휴업한 기간\n2. 임신 중의 여성이 제74조제1항부터 제3항까지의 규정에 따른 휴가로 휴업한 기간\n3. 「남녀고용평등과 일ㆍ가정 양립 지원에 관한 법률」 제19조에 따른 육아휴직으로 휴업한 기간\n4. 「남녀고용평등과 일ㆍ가정 양립 지원에 관한 법률」 제19조의2제1항에 따른 육아기 근로시간 단축을 사용하여 단축된 근로시간\n5. 제74조제7항에 따른 임신기 근로시간 단축을 사용하여 단축된 근로시간\n⑧ 제1항ㆍ제2항 및 제4항에 따른 휴가는 1년간(계속하여 근로한 기간이 1년 미만인 근로자의 제2항에 따른 유급휴가는 최초 1년의 근로가 끝날 때까지의 기간을 말한다) 행사하지 아니하면 소멸된다. 다만, 사용자의 귀책사유로 사용하지 못한 경우에는 그러하지 아니하다.<개정 2020. 3. 31., 2026. 6. 9.>\n⑨ 사용자는 제1항ㆍ제2항ㆍ제4항 및 제5항에 따른 유급휴가의 청구 또는 사용을 이유로 근로자를 해고하거나 그 밖의 불리한 처우를 하여서는 아니 된다.<신설 2026. 6. 9.>\n[시행일: 2027. 6. 10.] 제60조"}, {"doc": "법령/근로기준법.md", "heading": "제61조 (연차 유급휴가의 사용 촉진)", "text": "### 제61조 (연차 유급휴가의 사용 촉진)\n① 사용자가 제60조제1항ㆍ제2항 및 제4항에 따른 유급휴가(계속하여 근로한 기간이 1년 미만인 근로자의 제60조제2항에 따른 유급휴가는 제외한다)의 사용을 촉진하기 위하여 다음 각 호의 조치를 하였음에도 불구하고 근로자가 휴가를 사용하지 아니하여 제60조제7항 본문에 따라 소멸된 경우에는 사용자는 그 사용하지 아니한 휴가에 대하여 보상할 의무가 없고, 제60조제7항 단서에 따른 사용자의 귀책사유에 해당하지 아니하는 것으로 본다. <개정 2012. 2. 1., 2017. 11. 28., 2020. 3. 31.>\n1. 제60조제7항 본문에 따른 기간이 끝나기 6개월 전을 기준으로 10일 이내에 사용자가 근로자별로 사용하지 아니한 휴가 일수를 알려주고, 근로자가 그 사용 시기를 정하여 사용자에게 통보하도록 서면으로 촉구할 것\n2. 제1호에 따른 촉구에도 불구하고 근로자가 촉구를 받은 때부터 10일 이내에 사용하지 아니한 휴가의 전부 또는 일부의 사용 시기를 정하여 사용자에게 통보하지 아니하면 제60조제7항 본문에 따른 기간이 끝나기 2개월 전까지 사용자가 사용하지 아니한 휴가의 사용 시기를 정하여 근로자에게 서면으로 통보할 것\n② 사용자가 계속하여 근로한 기간이 1년 미만인 근로자의 제60조제2항에 따른 유급휴가의 사용을 촉진하기 위하여 다음 각 호의 조치를 하였음에도 불구하고 근로자가 휴가를 사용하지 아니하여 제60조제7항 본문에 따라 소멸된 경우에는 사용자는 그 사용하지 아니한 휴가에 대하여 보상할 의무가 없고, 같은 항 단서에 따른 사용자의 귀책사유에 해당하지 아니하는 것으로 본다.<신설 2020. 3. 31.>\n1. 최초 1년의 근로기간이 끝나기 3개월 전을 기준으로 10일 이내에 사용자가 근로자별로 사용하지 아니한 휴가 일수를 알려주고, 근로자가 그 사용 시기를 정하여 사용자에게 통보하도록 서면으로 촉구할 것. 다만, 사용자가 서면 촉구한 후 발생한 휴가에 대해서는 최초 1년의 근로기간이 끝나기 1개월 전을 기준으로 5일 이내에 촉구하여야 한다.\n2. 제1호에 따른 촉구에도 불구하고 근로자가 촉구를 받은 때부터 10일 이내에 사용하지 아니한 휴가의 전부 또는 일부의 사용 시기를 정하여 사용자에게 통보하지 아니하면 최초 1년의 근로기간이 끝나기 1개월 전까지 사용자가 사용하지 아니한 휴가의 사용 시기를 정하여 근로자에게 서면으로 통보할 것. 다만, 제1호 단서에 따라 촉구한 휴가에 대해서는 최초 1년의 근로기간이 끝나기 10일 전까지 서면으로 통보하여야 한다."}, {"doc": "법령/근로기준법.md", "heading": "제61조 (연차 유급휴가의 사용 촉진) [2027. 6. 10. 시행]", "text": "### 제61조 (연차 유급휴가의 사용 촉진) [2027. 6. 10. 시행]\n① 사용자가 제60조제1항ㆍ제2항 및 제4항에 따른 유급휴가(계속하여 근로한 기간이 1년 미만인 근로자의 제60조제2항에 따른 유급휴가는 제외한다)의 사용을 촉진하기 위하여 다음 각 호의 조치를 하였음에도 불구하고 근로자가 휴가를 사용하지 아니하여 제60조제8항 본문에 따라 소멸된 경우에는 사용자는 그 사용하지 아니한 휴가에 대하여 보상할 의무가 없고, 제60조제8항 단서에 따른 사용자의 귀책사유에 해당하지 아니하는 것으로 본다. <개정 2012. 2. 1., 2017. 11. 28., 2020. 3. 31., 2026. 6. 9.>\n1. 제60조제8항 본문에 따른 기간이 끝나기 6개월 전을 기준으로 10일 이내에 사용자가 근로자별로 사용하지 아니한 휴가 일수를 알려주고, 근로자가 그 사용 시기를 정하여 사용자에게 통보하도록 서면으로 촉구할 것\n2. 제1호에 따른 촉구에도 불구하고 근로자가 촉구를 받은 때부터 10일 이내에 사용하지 아니한 휴가의 전부 또는 일부의 사용 시기를 정하여 사용자에게 통보하지 아니하면 제60조제8항 본문에 따른 기간이 끝나기 2개월 전까지 사용자가 사용하지 아니한 휴가의 사용 시기를 정하여 근로자에게 서면으로 통보할 것\n② 사용자가 계속하여 근로한 기간이 1년 미만인 근로자의 제60조제2항에 따른 유급휴가의 사용을 촉진하기 위하여 다음 각 호의 조치를 하였음에도 불구하고 근로자가 휴가를 사용하지 아니하여 제60조제8항 본문에 따라 소멸된 경우에는 사용자는 그 사용하지 아니한 휴가에 대하여 보상할 의무가 없고, 같은 항 단서에 따른 사용자의 귀책사유에 해당하지 아니하는 것으로 본다.<신설 2020. 3. 31., 2026. 6. 9.>\n1. 최초 1년의 근로기간이 끝나기 3개월 전을 기준으로 10일 이내에 사용자가 근로자별로 사용하지 아니한 휴가 일수를 알려주고, 근로자가 그 사용 시기를 정하여 사용자에게 통보하도록 서면으로 촉구할 것. 다만, 사용자가 서면 촉구한 후 발생한 휴가에 대해서는 최초 1년의 근로기간이 끝나기 1개월 전을 기준으로 5일 이내에 촉구하여야 한다.\n2. 제1호에 따른 촉구에도 불구하고 근로자가 촉구를 받은 때부터 10일 이내에 사용하지 아니한 휴가의 전부 또는 일부의 사용 시기를 정하여 사용자에게 통보하지 아니하면 최초 1년의 근로기간이 끝나기 1개월 전까지 사용자가 사용하지 아니한 휴가의 사용 시기를 정하여 근로자에게 서면으로 통보할 것. 다만, 제1호 단서에 따라 촉구한 휴가에 대해서는 최초 1년의 근로기간이 끝나기 10일 전까지 서면으로 통보하여야 한다.\n[시행일: 2027. 6. 10.] 제61조"}, {"doc": "법령/근로기준법.md", "heading": "제62조 (유급휴가의 대체)", "text": "### 제62조 (유급휴가의 대체)\n사용자는 근로자대표와의 서면 합의에 따라 제60조에 따른 연차 유급휴가일을 갈음하여 특정한 근로일에 근로자를 휴무시킬 수 있다."}, {"doc": "법령/근로기준법.md", "heading": "제63조 (적용의 제외)", "text": "### 제63조 (적용의 제외)\n이 장과 제5장에서 정한 근로시간, 휴게와 휴일에 관한 규정은 다음 각 호의 어느 하나에 해당하는 근로자에 대하여는 적용하지 아니한다. <개정 2010. 6. 4., 2020. 5. 26., 2021. 1. 5.>\n1. 토지의 경작ㆍ개간, 식물의 식재(植栽)ㆍ재배ㆍ채취 사업, 그 밖의 농림 사업\n2. 동물의 사육, 수산 동식물의 채취ㆍ포획ㆍ양식 사업, 그 밖의 축산, 양잠, 수산 사업\n3. 감시(監視) 또는 단속적(斷續的)으로 근로에 종사하는 사람으로서 사용자가 고용노동부장관의 승인을 받은 사람\n4. 대통령령으로 정하는 업무에 종사하는 근로자"}, {"doc": "법령/근로기준법.md", "heading": "제64조 (최저 연령과 취직인허증)", "text": "### 제64조 (최저 연령과 취직인허증)\n① 15세 미만인 사람(「초ㆍ중등교육법」에 따른 중학교에 재학 중인 18세 미만인 사람을 포함한다)은 근로자로 사용하지 못한다. 다만, 대통령령으로 정하는 기준에 따라 고용노동부장관이 발급한 취직인허증(就職認許證)을 지닌 사람은 근로자로 사용할 수 있다. <개정 2010. 6. 4., 2020. 5. 26.>\n② 제1항의 취직인허증은 본인의 신청에 따라 의무교육에 지장이 없는 경우에는 직종(職種)을 지정하여서만 발행할 수 있다.\n③ 고용노동부장관은 거짓이나 그 밖의 부정한 방법으로 제1항 단서의 취직인허증을 발급받은 사람에게는 그 인허를 취소하여야 한다.<개정 2010. 6. 4., 2020. 5. 26.>"}, {"doc": "법령/근로기준법.md", "heading": "제65조 (사용 금지)", "text": "### 제65조 (사용 금지)\n① 사용자는 임신 중이거나 산후 1년이 지나지 아니한 여성(이하 “임산부”라 한다)과 18세 미만자를 도덕상 또는 보건상 유해ㆍ위험한 사업에 사용하지 못한다.\n② 사용자는 임산부가 아닌 18세 이상의 여성을 제1항에 따른 보건상 유해ㆍ위험한 사업 중 임신 또는 출산에 관한 기능에 유해ㆍ위험한 사업에 사용하지 못한다.\n③ 제1항 및 제2항에 따른 금지 직종은 대통령령으로 정한다."}, {"doc": "법령/근로기준법.md", "heading": "제66조 (연소자 증명서)", "text": "### 제66조 (연소자 증명서)\n사용자는 18세 미만인 사람에 대하여는 그 연령을 증명하는 가족관계기록사항에 관한 증명서와 친권자 또는 후견인의 동의서를 사업장에 갖추어 두어야 한다. <개정 2007. 5. 17., 2020. 5. 26.>"}, {"doc": "법령/근로기준법.md", "heading": "제67조 (근로계약)", "text": "### 제67조 (근로계약)\n① 친권자나 후견인은 미성년자의 근로계약을 대리할 수 없다.\n② 친권자, 후견인 또는 고용노동부장관은 근로계약이 미성년자에게 불리하다고 인정하는 경우에는 이를 해지할 수 있다.<개정 2010. 6. 4.>\n③ 사용자는 18세 미만인 사람과 근로계약을 체결하는 경우에는 제17조에 따른 근로조건을 서면(「전자문서 및 전자거래 기본법」 제2조제1호에 따른 전자문서를 포함한다)으로 명시하여 교부하여야 한다.<신설 2007. 7. 27., 2020. 5. 26., 2021. 1. 5.>"}, {"doc": "법령/근로기준법.md", "heading": "제68조 (임금의 청구)", "text": "### 제68조 (임금의 청구)\n미성년자는 독자적으로 임금을 청구할 수 있다."}, {"doc": "법령/근로기준법.md", "heading": "제69조 (근로시간)", "text": "### 제69조 (근로시간)\n15세 이상 18세 미만인 사람의 근로시간은 1일에 7시간, 1주에 35시간을 초과하지 못한다. 다만, 당사자 사이의 합의에 따라 1일에 1시간, 1주에 5시간을 한도로 연장할 수 있다. <개정 2018. 3. 20., 2020. 5. 26.>"}, {"doc": "법령/근로기준법.md", "heading": "제70조 (야간근로와 휴일근로의 제한)", "text": "### 제70조 (야간근로와 휴일근로의 제한)\n① 사용자는 18세 이상의 여성을 오후 10시부터 오전 6시까지의 시간 및 휴일에 근로시키려면 그 근로자의 동의를 받아야 한다.\n② 사용자는 임산부와 18세 미만자를 오후 10시부터 오전 6시까지의 시간 및 휴일에 근로시키지 못한다. 다만, 다음 각 호의 어느 하나에 해당하는 경우로서 고용노동부장관의 인가를 받으면 그러하지 아니하다.<개정 2010. 6. 4.>\n1. 18세 미만자의 동의가 있는 경우\n2. 산후 1년이 지나지 아니한 여성의 동의가 있는 경우\n3. 임신 중의 여성이 명시적으로 청구하는 경우\n③ 사용자는 제2항의 경우 고용노동부장관의 인가를 받기 전에 근로자의 건강 및 모성 보호를 위하여 그 시행 여부와 방법 등에 관하여 그 사업 또는 사업장의 근로자대표와 성실하게 협의하여야 한다.<개정 2010. 6. 4.>"}, {"doc": "법령/근로기준법.md", "heading": "제71조 (시간외근로)", "text": "### 제71조 (시간외근로)\n사용자는 산후 1년이 지나지 아니한 여성에 대하여는 단체협약이 있는 경우라도 1일에 2시간, 1주에 6시간, 1년에 150시간을 초과하는 시간외근로를 시키지 못한다. <개정 2018. 3. 20.>"}, {"doc": "법령/근로기준법.md", "heading": "제72조 (갱내근로의 금지)", "text": "### 제72조 (갱내근로의 금지)\n사용자는 여성과 18세 미만인 사람을 갱내(坑內)에서 근로시키지 못한다. 다만, 보건ㆍ의료, 보도ㆍ취재 등 대통령령으로 정하는 업무를 수행하기 위하여 일시적으로 필요한 경우에는 그러하지 아니하다. <개정 2020. 5. 26.>"}, {"doc": "법령/근로기준법.md", "heading": "제73조 (생리휴가)", "text": "### 제73조 (생리휴가)\n사용자는 여성 근로자가 청구하면 월 1일의 생리휴가를 주어야 한다."}, {"doc": "법령/근로기준법.md", "heading": "제74조 (임산부의 보호)", "text": "### 제74조 (임산부의 보호)\n① 사용자는 임신 중의 여성에게 출산 전과 출산 후를 통하여 90일(미숙아를 출산한 경우에는 100일, 한 번에 둘 이상 자녀를 임신한 경우에는 120일)의 출산전후휴가를 주어야 한다. 이 경우 휴가 기간의 배정은 출산 후에 45일(한 번에 둘 이상 자녀를 임신한 경우에는 60일) 이상이 되어야 하고, 미숙아의 범위, 휴가 부여 절차 등에 필요한 사항은 고용노동부령으로 정한다. <개정 2012. 2. 1., 2014. 1. 21., 2024. 10. 22.>\n② 사용자는 임신 중인 여성 근로자가 유산의 경험 등 대통령령으로 정하는 사유로 제1항의 휴가를 청구하는 경우 출산 전 어느 때 라도 휴가를 나누어 사용할 수 있도록 하여야 한다. 이 경우 출산 후의 휴가 기간은 연속하여 45일(한 번에 둘 이상 자녀를 임신한 경우에는 60일) 이상이 되어야 한다.<신설 2012. 2. 1., 2014. 1. 21.>\n③ 사용자는 임신 중인 여성이 유산 또는 사산한 경우로서 그 근로자가 청구하면 대통령령으로 정하는 바에 따라 유산ㆍ사산 휴가를 주어야 한다. 다만, 인공 임신중절 수술(「모자보건법」 제14조제1항에 따른 경우는 제외한다)에 따른 유산의 경우는 그러하지 아니하다.<개정 2012. 2. 1.>\n④ 제1항부터 제3항까지의 규정에 따른 휴가 중 최초 60일(한 번에 둘 이상 자녀를 임신한 경우에는 75일)은 유급으로 한다. 다만, 「남녀고용평등과 일ㆍ가정 양립 지원에 관한 법률」 제18조에 따라 출산전후휴가급여 등이 지급된 경우에는 그 금액의 한도에서 지급의 책임을 면한다.<개정 2007. 12. 21., 2012. 2. 1., 2014. 1. 21.>\n⑤ 사용자는 임신 중의 여성 근로자에게 시간외근로를 하게 하여서는 아니 되며, 그 근로자의 요구가 있는 경우에는 쉬운 종류의 근로로 전환하여야 한다.<개정 2012. 2. 1.>\n⑥ 사업주는 제1항에 따른 출산전후휴가 종료 후에는 휴가 전과 동일한 업무 또는 동등한 수준의 임금을 지급하는 직무에 복귀시켜야 한다.<신설 2008. 3. 28., 2012. 2. 1.>\n⑦ 사용자는 임신 후 12주 이내 또는 32주 이후에 있는 여성 근로자(고용노동부령으로 정하는 유산, 조산 등 위험이 있는 여성 근로자의 경우 임신 전 기간)가 1일 2시간의 근로시간 단축을 신청하는 경우 이를 허용하여야 한다. 다만, 1일 근로시간이 8시간 미만인 근로자에 대하여는 1일 근로시간이 6시간이 되도록 근로시간 단축을 허용할 수 있다.<신설 2014. 3. 24., 2024. 10. 22.>\n⑧ 사용자는 제7항에 따른 근로시간 단축을 이유로 해당 근로자의 임금을 삭감하여서는 아니 된다.<신설 2014. 3. 24.>\n⑨ 사용자는 임신 중인 여성 근로자가 1일 소정근로시간을 유지하면서 업무의 시작 및 종료 시각의 변경을 신청하는 경우 이를 허용하여야 한다. 다만, 정상적인 사업 운영에 중대한 지장을 초래하는 경우 등 대통령령으로 정하는 경우에는 그러하지 아니하다.<신설 2021. 5. 18.>\n⑩ 제7항에 따른 근로시간 단축의 신청방법 및 절차, 제9항에 따른 업무의 시작 및 종료 시각 변경의 신청방법 및 절차 등에 관하여 필요한 사항은 대통령령으로 정한다.<신설 2014. 3. 24., 2021. 5. 18.>"}, {"doc": "법령/근로기준법.md", "heading": "제74조의2 (태아검진 시간의 허용 등)", "text": "### 제74조의2 (태아검진 시간의 허용 등)\n① 사용자는 임신한 여성근로자가 「모자보건법」 제10조에 따른 임산부 정기건강진단을 받는데 필요한 시간을 청구하는 경우 이를 허용하여 주어야 한다.\n② 사용자는 제1항에 따른 건강진단 시간을 이유로 그 근로자의 임금을 삭감하여서는 아니 된다.\n[본조신설 2008. 3. 21.]"}, {"doc": "법령/근로기준법.md", "heading": "제75조 (육아 시간)", "text": "### 제75조 (육아 시간)\n생후 1년 미만의 유아(乳兒)를 가진 여성 근로자가 청구하면 1일 2회 각각 30분 이상의 유급 수유 시간을 주어야 한다."}, {"doc": "법령/근로기준법.md", "heading": "제76조 (안전과 보건)", "text": "### 제76조 (안전과 보건)\n근로자의 안전과 보건에 관하여는 「산업안전보건법」에서 정하는 바에 따른다."}, {"doc": "법령/근로기준법.md", "heading": "제76조의2 (직장 내 괴롭힘의 금지)", "text": "### 제76조의2 (직장 내 괴롭힘의 금지)\n사용자 또는 근로자는 직장에서의 지위 또는 관계 등의 우위를 이용하여 업무상 적정범위를 넘어 다른 근로자에게 신체적ㆍ정신적 고통을 주거나 근무환경을 악화시키는 행위(이하 “직장 내 괴롭힘”이라 한다)를 하여서는 아니 된다.\n[본조신설 2019. 1. 15.]"}, {"doc": "법령/근로기준법.md", "heading": "제76조의3 (직장 내 괴롭힘 발생 시 조치)", "text": "### 제76조의3 (직장 내 괴롭힘 발생 시 조치)\n① 누구든지 직장 내 괴롭힘 발생 사실을 알게 된 경우 그 사실을 사용자에게 신고할 수 있다.\n② 사용자는 제1항에 따른 신고를 접수하거나 직장 내 괴롭힘 발생 사실을 인지한 경우에는 지체 없이 당사자 등을 대상으로 그 사실 확인을 위하여 객관적으로 조사를 실시하여야 한다.<개정 2021. 4. 13.>\n③ 사용자는 제2항에 따른 조사 기간 동안 직장 내 괴롭힘과 관련하여 피해를 입은 근로자 또는 피해를 입었다고 주장하는 근로자(이하 “피해근로자등”이라 한다)를 보호하기 위하여 필요한 경우 해당 피해근로자등에 대하여 근무장소의 변경, 유급휴가 명령 등 적절한 조치를 하여야 한다. 이 경우 사용자는 피해근로자등의 의사에 반하는 조치를 하여서는 아니 된다.\n④ 사용자는 제2항에 따른 조사 결과 직장 내 괴롭힘 발생 사실이 확인된 때에는 피해근로자가 요청하면 근무장소의 변경, 배치전환, 유급휴가 명령 등 적절한 조치를 하여야 한다.\n⑤ 사용자는 제2항에 따른 조사 결과 직장 내 괴롭힘 발생 사실이 확인된 때에는 지체 없이 행위자에 대하여 징계, 근무장소의 변경 등 필요한 조치를 하여야 한다. 이 경우 사용자는 징계 등의 조치를 하기 전에 그 조치에 대하여 피해근로자의 의견을 들어야 한다.\n⑥ 사용자는 직장 내 괴롭힘 발생 사실을 신고한 근로자 및 피해근로자등에게 해고나 그 밖의 불리한 처우를 하여서는 아니 된다.\n⑦ 제2항에 따라 직장 내 괴롭힘 발생 사실을 조사한 사람, 조사 내용을 보고받은 사람 및 그 밖에 조사 과정에 참여한 사람은 해당 조사 과정에서 알게 된 비밀을 피해근로자등의 의사에 반하여 다른 사람에게 누설하여서는 아니 된다. 다만, 조사와 관련된 내용을 사용자에게 보고하거나 관계 기관의 요청에 따라 필요한 정보를 제공하는 경우는 제외한다.<신설 2021. 4. 13.>\n[본조신설 2019. 1. 15.]"}, {"doc": "법령/근로기준법.md", "heading": "제77조 (기능 습득자의 보호)", "text": "### 제77조 (기능 습득자의 보호)\n사용자는 양성공, 수습, 그 밖의 명칭을 불문하고 기능의 습득을 목적으로 하는 근로자를 혹사하거나 가사, 그 밖의 기능 습득과 관계없는 업무에 종사시키지 못한다. <개정 2020. 5. 26.>"}, {"doc": "법령/근로기준법.md", "heading": "제78조 (요양보상)", "text": "### 제78조 (요양보상)\n① 근로자가 업무상 부상 또는 질병에 걸리면 사용자는 그 비용으로 필요한 요양을 행하거나 필요한 요양비를 부담하여야 한다.\n② 제1항에 따른 업무상 질병과 요양의 범위 및 요양보상의 시기는 대통령령으로 정한다.<개정 2008. 3. 21.>"}, {"doc": "법령/근로기준법.md", "heading": "제79조 (휴업보상)", "text": "### 제79조 (휴업보상)\n① 사용자는 제78조에 따라 요양 중에 있는 근로자에게 그 근로자의 요양 중 평균임금의 100분의 60의 휴업보상을 하여야 한다. <개정 2008. 3. 21.>\n② 제1항에 따른 휴업보상을 받을 기간에 그 보상을 받을 사람이 임금의 일부를 지급받은 경우에는 사용자는 평균임금에서 그 지급받은 금액을 뺀 금액의 100분의 60의 휴업보상을 하여야 한다.<신설 2008. 3. 21., 2020. 5. 26.>\n③ 휴업보상의 시기는 대통령령으로 정한다.<신설 2008. 3. 21.>"}, {"doc": "법령/근로기준법.md", "heading": "제80조 (장해보상)", "text": "### 제80조 (장해보상)\n① 근로자가 업무상 부상 또는 질병에 걸리고, 완치된 후 신체에 장해가 있으면 사용자는 그 장해 정도에 따라 평균임금에 별표에서 정한 일수를 곱한 금액의 장해보상을 하여야 한다. <개정 2008. 3. 21.>\n② 이미 신체에 장해가 있는 사람이 부상 또는 질병으로 인하여 같은 부위에 장해가 더 심해진 경우에 그 장해에 대한 장해보상 금액은 장해 정도가 더 심해진 장해등급에 해당하는 장해보상의 일수에서 기존의 장해등급에 해당하는 장해보상의 일수를 뺀 일수에 보상청구사유 발생 당시의 평균임금을 곱하여 산정한 금액으로 한다.<신설 2008. 3. 21., 2020. 5. 26.>\n③ 장해보상을 하여야 하는 신체장해 등급의 결정 기준과 장해보상의 시기는 대통령령으로 정한다.<신설 2008. 3. 21.>"}, {"doc": "법령/근로기준법.md", "heading": "제81조 (휴업보상과 장해보상의 예외)", "text": "### 제81조 (휴업보상과 장해보상의 예외)\n근로자가 중대한 과실로 업무상 부상 또는 질병에 걸리고 또한 사용자가 그 과실에 대하여 노동위원회의 인정을 받으면 휴업보상이나 장해보상을 하지 아니하여도 된다."}, {"doc": "법령/근로기준법.md", "heading": "제82조 (유족보상)", "text": "### 제82조 (유족보상)\n① 근로자가 업무상 사망한 경우에는 사용자는 근로자가 사망한 후 지체 없이 그 유족에게 평균임금 1,000일분의 유족보상을 하여야 한다. <개정 2008. 3. 21.>\n② 제1항에서의 유족의 범위, 유족보상의 순위 및 보상을 받기로 확정된 사람이 사망한 경우의 유족보상의 순위는 대통령령으로 정한다.<신설 2008. 3. 21., 2020. 5. 26.>"}, {"doc": "법령/근로기준법.md", "heading": "제83조 (장례비)", "text": "### 제83조 (장례비)\n근로자가 업무상 사망한 경우에는 사용자는 근로자가 사망한 후 지체 없이 평균임금 90일분의 장례비를 지급하여야 한다. <개정 2008. 3. 21., 2021. 1. 5.>\n[제목개정 2021. 1. 5.]"}, {"doc": "법령/근로기준법.md", "heading": "제84조 (일시보상)", "text": "### 제84조 (일시보상)\n제78조에 따라 보상을 받는 근로자가 요양을 시작한 지 2년이 지나도 부상 또는 질병이 완치되지 아니하는 경우에는 사용자는 그 근로자에게 평균임금 1,340일분의 일시보상을 하여 그 후의 이 법에 따른 모든 보상책임을 면할 수 있다."}, {"doc": "법령/근로기준법.md", "heading": "제85조 (분할보상)", "text": "### 제85조 (분할보상)\n사용자는 지급 능력이 있는 것을 증명하고 보상을 받는 사람의 동의를 받으면 제80조, 제82조 또는 제84조에 따른 보상금을 1년에 걸쳐 분할보상을 할 수 있다. <개정 2020. 5. 26.>"}, {"doc": "법령/근로기준법.md", "heading": "제86조 (보상 청구권)", "text": "### 제86조 (보상 청구권)\n보상을 받을 권리는 퇴직으로 인하여 변경되지 아니하고, 양도나 압류하지 못한다."}, {"doc": "법령/근로기준법.md", "heading": "제87조 (다른 손해배상과의 관계)", "text": "### 제87조 (다른 손해배상과의 관계)\n보상을 받게 될 사람이 동일한 사유에 대하여 「민법」이나 그 밖의 법령에 따라 이 법의 재해보상에 상당한 금품을 받으면 그 가액(價額)의 한도에서 사용자는 보상의 책임을 면한다. <개정 2020. 5. 26.>"}, {"doc": "법령/근로기준법.md", "heading": "제88조 (고용노동부장관의 심사와 중재)", "text": "### 제88조 (고용노동부장관의 심사와 중재)\n① 업무상의 부상, 질병 또는 사망의 인정, 요양의 방법, 보상금액의 결정, 그 밖에 보상의 실시에 관하여 이의가 있는 자는 고용노동부장관에게 심사나 사건의 중재를 청구할 수 있다. <개정 2010. 6. 4.>\n② 제1항의 청구가 있으면 고용노동부장관은 1개월 이내에 심사나 중재를 하여야 한다.<개정 2010. 6. 4.>\n③ 고용노동부장관은 필요에 따라 직권으로 심사나 사건의 중재를 할 수 있다.<개정 2010. 6. 4.>\n④ 고용노동부장관은 심사나 중재를 위하여 필요하다고 인정하면 의사에게 진단이나 검안을 시킬 수 있다.<개정 2010. 6. 4.>\n⑤ 제1항에 따른 심사나 중재의 청구와 제2항에 따른 심사나 중재의 시작은 시효의 중단에 관하여는 재판상의 청구로 본다.\n[제목개정 2010. 6. 4.]"}, {"doc": "법령/근로기준법.md", "heading": "제89조 (노동위원회의 심사와 중재)", "text": "### 제89조 (노동위원회의 심사와 중재)\n① 고용노동부장관이 제88조제2항의 기간에 심사 또는 중재를 하지 아니하거나 심사와 중재의 결과에 불복하는 자는 노동위원회에 심사나 중재를 청구할 수 있다. <개정 2010. 6. 4.>\n② 제1항의 청구가 있으면 노동위원회는 1개월 이내에 심사나 중재를 하여야 한다."}, {"doc": "법령/근로기준법.md", "heading": "제90조 (도급 사업에 대한 예외)", "text": "### 제90조 (도급 사업에 대한 예외)\n① 사업이 여러 차례의 도급에 따라 행하여지는 경우의 재해보상에 대하여는 원수급인(元受給人)을 사용자로 본다.\n② 제1항의 경우에 원수급인이 서면상 계약으로 하수급인에게 보상을 담당하게 하는 경우에는 그 수급인도 사용자로 본다. 다만, 2명 이상의 하수급인에게 똑같은 사업에 대하여 중복하여 보상을 담당하게 하지 못한다.\n③ 제2항의 경우에 원수급인이 보상의 청구를 받으면 보상을 담당한 하수급인에게 우선 최고(催告)할 것을 청구할 수 있다. 다만, 그 하수급인이 파산의 선고를 받거나 행방이 알려지지 아니하는 경우에는 그러하지 아니하다."}, {"doc": "법령/근로기준법.md", "heading": "제91조 (서류의 보존)", "text": "### 제91조 (서류의 보존)\n사용자는 재해보상에 관한 중요한 서류를 재해보상이 끝나지 아니하거나 제92조에 따라 재해보상 청구권이 시효로 소멸되기 전에 폐기하여서는 아니 된다. <개정 2008. 3. 21.>"}, {"doc": "법령/근로기준법.md", "heading": "제92조 (시효)", "text": "### 제92조 (시효)\n이 법의 규정에 따른 재해보상 청구권은 3년간 행사하지 아니하면 시효로 소멸한다."}, {"doc": "법령/근로기준법.md", "heading": "제93조 (취업규칙의 작성ㆍ신고)", "text": "### 제93조 (취업규칙의 작성ㆍ신고)\n상시 10명 이상의 근로자를 사용하는 사용자는 다음 각 호의 사항에 관한 취업규칙을 작성하여 고용노동부장관에게 신고하여야 한다. 이를 변경하는 경우에도 또한 같다. <개정 2008. 3. 28., 2010. 6. 4., 2012. 2. 1., 2019. 1. 15.>\n1. 업무의 시작과 종료 시각, 휴게시간, 휴일, 휴가 및 교대 근로에 관한 사항\n2. 임금의 결정ㆍ계산ㆍ지급 방법, 임금의 산정기간ㆍ지급시기 및 승급(昇給)에 관한 사항\n3. 가족수당의 계산ㆍ지급 방법에 관한 사항\n4. 퇴직에 관한 사항\n5. 「근로자퇴직급여 보장법」 제4조에 따라 설정된 퇴직급여, 상여 및 최저임금에 관한 사항\n6. 근로자의 식비, 작업 용품 등의 부담에 관한 사항\n7. 근로자를 위한 교육시설에 관한 사항\n8. 출산전후휴가ㆍ육아휴직 등 근로자의 모성 보호 및 일ㆍ가정 양립 지원에 관한 사항\n9. 안전과 보건에 관한 사항\n9의2. 근로자의 성별ㆍ연령 또는 신체적 조건 등의 특성에 따른 사업장 환경의 개선에 관한 사항\n10. 업무상과 업무 외의 재해부조(災害扶助)에 관한 사항\n11. 직장 내 괴롭힘의 예방 및 발생 시 조치 등에 관한 사항\n12. 표창과 제재에 관한 사항\n13. 그 밖에 해당 사업 또는 사업장의 근로자 전체에 적용될 사항"}, {"doc": "법령/근로기준법.md", "heading": "제94조 (규칙의 작성, 변경 절차)", "text": "### 제94조 (규칙의 작성, 변경 절차)\n① 사용자는 취업규칙의 작성 또는 변경에 관하여 해당 사업 또는 사업장에 근로자의 과반수로 조직된 노동조합이 있는 경우에는 그 노동조합, 근로자의 과반수로 조직된 노동조합이 없는 경우에는 근로자의 과반수의 의견을 들어야 한다. 다만, 취업규칙을 근로자에게 불리하게 변경하는 경우에는 그 동의를 받아야 한다.\n② 사용자는 제93조에 따라 취업규칙을 신고할 때에는 제1항의 의견을 적은 서면을 첨부하여야 한다."}, {"doc": "법령/근로기준법.md", "heading": "제95조 (제재 규정의 제한)", "text": "### 제95조 (제재 규정의 제한)\n취업규칙에서 근로자에 대하여 감급(減給)의 제재를 정할 경우에 그 감액은 1회의 금액이 평균임금의 1일분의 2분의 1을, 총액이 1임금지급기의 임금 총액의 10분의 1을 초과하지 못한다."}, {"doc": "법령/근로기준법.md", "heading": "제96조 (단체협약의 준수)", "text": "### 제96조 (단체협약의 준수)\n① 취업규칙은 법령이나 해당 사업 또는 사업장에 대하여 적용되는 단체협약과 어긋나서는 아니 된다.\n② 고용노동부장관은 법령이나 단체협약에 어긋나는 취업규칙의 변경을 명할 수 있다.<개정 2010. 6. 4.>"}, {"doc": "법령/근로기준법.md", "heading": "제97조 (위반의 효력)", "text": "### 제97조 (위반의 효력)\n취업규칙에서 정한 기준에 미달하는 근로조건을 정한 근로계약은 그 부분에 관하여는 무효로 한다. 이 경우 무효로 된 부분은 취업규칙에 정한 기준에 따른다."}, {"doc": "법령/근로기준법.md", "heading": "제98조 (기숙사 생활의 보장)", "text": "### 제98조 (기숙사 생활의 보장)\n① 사용자는 사업 또는 사업장의 부속 기숙사에 기숙하는 근로자의 사생활의 자유를 침해하지 못한다.\n② 사용자는 기숙사 생활의 자치에 필요한 임원 선거에 간섭하지 못한다."}, {"doc": "법령/근로기준법.md", "heading": "제99조 (규칙의 작성과 변경)", "text": "### 제99조 (규칙의 작성과 변경)\n① 부속 기숙사에 근로자를 기숙시키는 사용자는 다음 각 호의 사항에 관하여 기숙사규칙을 작성하여야 한다.\n1. 기상(起床), 취침, 외출과 외박에 관한 사항\n2. 행사에 관한 사항\n3. 식사에 관한 사항\n4. 안전과 보건에 관한 사항\n5. 건설물과 설비의 관리에 관한 사항\n6. 그 밖에 기숙사에 기숙하는 근로자 전체에 적용될 사항\n② 사용자는 제1항에 따른 규칙의 작성 또는 변경에 관하여 기숙사에 기숙하는 근로자의 과반수를 대표하는 자의 동의를 받아야 한다.\n③ 사용자와 기숙사에 기숙하는 근로자는 기숙사규칙을 지켜야 한다."}, {"doc": "법령/근로기준법.md", "heading": "제100조 (부속 기숙사의 설치ㆍ운영 기준)", "text": "### 제100조 (부속 기숙사의 설치ㆍ운영 기준)\n사용자는 부속 기숙사를 설치ㆍ운영할 때 다음 각 호의 사항에 관하여 대통령령으로 정하는 기준을 충족하도록 하여야 한다.\n1. 기숙사의 구조와 설비\n2. 기숙사의 설치 장소\n3. 기숙사의 주거 환경 조성\n4. 기숙사의 면적\n5. 그 밖에 근로자의 안전하고 쾌적한 주거를 위하여 필요한 사항\n[전문개정 2019. 1. 15.]"}, {"doc": "법령/근로기준법.md", "heading": "제100조의2 (부속 기숙사의 유지관리 의무)", "text": "### 제100조의2 (부속 기숙사의 유지관리 의무)\n사용자는 제100조에 따라 설치한 부속 기숙사에 대하여 근로자의 건강 유지, 사생활 보호 등을 위한 조치를 하여야 한다.\n[본조신설 2019. 1. 15.]"}, {"doc": "법령/근로기준법.md", "heading": "제11장 노동감독관 등", "text": "## 제11장 노동감독관 등\n<개정 2026. 4. 7.>\n[시행일: 2026. 12. 8.]"}, {"doc": "법령/근로기준법.md", "heading": "제101조 (감독 기관)", "text": "### 제101조 (감독 기관)\n① 근로조건의 기준을 확보하기 위하여 고용노동부와 그 소속 기관에 근로감독관을 둔다. <개정 2010. 6. 4.>\n② 근로감독관의 자격, 임면(任免), 직무 배치에 관한 사항은 대통령령으로 정한다."}, {"doc": "법령/근로기준법.md", "heading": "제101조 (감독 기관) [2026. 12. 8. 시행]", "text": "### 제101조 (감독 기관) [2026. 12. 8. 시행]\n노동감독관의 권한ㆍ의무 등에 관하여는 「노동감독관 직무집행법」에서 정하는 바에 따른다.\n[전문개정 2026. 4. 7.]\n[시행일: 2026. 12. 8.] 제101조"}, {"doc": "법령/근로기준법.md", "heading": "제102조 (근로감독관의 권한) [2026. 12. 8. 시행]", "text": "### 제102조 (근로감독관의 권한) [2026. 12. 8. 시행]\n① 근로감독관은 사업장, 기숙사, 그 밖의 부속 건물을 현장조사하고 장부와 서류의 제출을 요구할 수 있으며 사용자와 근로자에 대하여 심문(尋問)할 수 있다. <개정 2017. 11. 28.>\n② 의사인 근로감독관이나 근로감독관의 위촉을 받은 의사는 취업을 금지하여야 할 질병에 걸릴 의심이 있는 근로자에 대하여 검진할 수 있다.\n③ 제1항 및 제2항의 경우에 근로감독관이나 그 위촉을 받은 의사는 그 신분증명서와 고용노동부장관의 현장조사 또는 검진지령서(檢診指令書)를 제시하여야 한다.<개정 2010. 6. 4., 2017. 11. 28.>\n④ 제3항의 현장조사 또는 검진지령서에는 그 일시, 장소 및 범위를 분명하게 적어야 한다.<개정 2017. 11. 28.>\n⑤ 근로감독관은 이 법이나 그 밖의 노동 관계 법령 위반의 죄에 관하여 「사법경찰관리의 직무를 행할 자와 그 직무범위에 관한 법률」에서 정하는 바에 따라 사법경찰관의 직무를 수행한다.\n\n제102조 삭제 <2026. 4. 7.>\n[시행일: 2026. 12. 8.] 제102조"}, {"doc": "법령/근로기준법.md", "heading": "제102조의2 (자료 제공의 요청) [2026. 12. 8. 시행]", "text": "### 제102조의2 (자료 제공의 요청) [2026. 12. 8. 시행]\n① 고용노동부장관은 이 법에서 정하는 근로조건 보호를 위하여 중앙행정기관의 장과 지방자치단체의 장 또는 근로복지공단 등 관련 기관ㆍ단체의 장에게 다음 각 호의 정보 또는 자료의 제공 및 관계 전산망의 이용을 요청할 수 있다.\n1. 「소득세법」 제4조제1항제1호에 따른 종합소득에 관한 자료\n2. 「고용보험법」 제13조 및 제15조에 따른 피보험자격에 관한 신고자료\n3. 그 밖에 근로자의 근로조건 보호를 위하여 필요한 정보 또는 자료로서 대통령령으로 정하는 정보 또는 자료\n② 제1항에 따라 자료의 제공을 요청받은 자는 정당한 사유가 없으면 그 요청에 따라야 한다.\n③ 제1항에 따라 제공되는 자료에 대하여는 수수료나 사용료 등을 면제한다.\n[본조신설 2024. 10. 22.]\n\n제102조의2 삭제 <2026. 4. 7.>\n[시행일: 2026. 12. 8.] 제102조의2"}, {"doc": "법령/근로기준법.md", "heading": "제103조 (근로감독관의 의무) [2026. 12. 8. 시행]", "text": "### 제103조 (근로감독관의 의무) [2026. 12. 8. 시행]\n근로감독관은 직무상 알게 된 비밀을 엄수하여야 한다. 근로감독관을 그만 둔 경우에도 또한 같다.\n\n제103조 삭제 <2026. 4. 7.>\n[시행일: 2026. 12. 8.] 제103조"}, {"doc": "법령/근로기준법.md", "heading": "제104조 (감독 기관에 대한 신고)", "text": "### 제104조 (감독 기관에 대한 신고)\n① 사업 또는 사업장에서 이 법 또는 이 법에 따른 대통령령을 위반한 사실이 있으면 근로자는 그 사실을 고용노동부장관이나 근로감독관에게 통보할 수 있다. <개정 2010. 6. 4.>\n② 사용자는 제1항의 통보를 이유로 근로자에게 해고나 그 밖에 불리한 처우를 하지 못한다."}, {"doc": "법령/근로기준법.md", "heading": "제104조 (감독 기관에 대한 신고) [2026. 12. 8. 시행]", "text": "### 제104조 (감독 기관에 대한 신고) [2026. 12. 8. 시행]\n사용자는 근로자가 이 법 또는 이 법에 따른 대통령령을 위반한 사실을 고용노동부장관이나 노동감독관에게 통보한 것을 이유로 근로자에게 해고나 그 밖에 불리한 처우를 하지 못한다.\n[전문개정 2026. 4. 7.]\n[시행일: 2026. 12. 8.] 제104조"}, {"doc": "법령/근로기준법.md", "heading": "제105조 (사법경찰권 행사자의 제한) [2026. 12. 8. 시행]", "text": "### 제105조 (사법경찰권 행사자의 제한) [2026. 12. 8. 시행]\n이 법이나 그 밖의 노동 관계 법령에 따른 현장조사, 서류의 제출, 심문 등의 수사는 검사와 근로감독관이 전담하여 수행한다. 다만, 근로감독관의 직무에 관한 범죄의 수사는 그러하지 아니하다. <개정 2017. 11. 28.>\n\n제105조 삭제 <2026. 4. 7.>\n[시행일: 2026. 12. 8.] 제105조"}, {"doc": "법령/근로기준법.md", "heading": "제106조 (권한의 위임)", "text": "### 제106조 (권한의 위임)\n이 법에 따른 고용노동부장관의 권한은 대통령령으로 정하는 바에 따라 그 일부를 지방고용노동관서의 장에게 위임할 수 있다. <개정 2010. 6. 4.>"}, {"doc": "법령/근로기준법.md", "heading": "제107조 (벌칙)", "text": "### 제107조 (벌칙)\n제7조, 제8조, 제9조, 제23조제2항 또는 제40조를 위반한 자는 5년 이하의 징역 또는 5천만원 이하의 벌금에 처한다. <개정 2017. 11. 28.>"}, {"doc": "법령/근로기준법.md", "heading": "제107조 (벌칙) [2026. 10. 8. 시행]", "text": "### 제107조 (벌칙) [2026. 10. 8. 시행]\n① 제7조, 제8조, 제9조, 제23조제2항, 제36조, 제40조, 제43조, 제44조, 제44조의2, 제46조, 제51조의3, 제52조제2항제2호 또는 제56조를 위반한 자는 5년 이하의 징역 또는 5천만원 이하의 벌금에 처한다. <개정 2017. 11. 28., 2026. 4. 7.>\n② 제36조, 제43조, 제44조, 제44조의2, 제46조, 제51조의3, 제52조제2항제2호 또는 제56조를 위반한 자에 대하여는 피해자의 명시적인 의사와 다르게 공소를 제기할 수 없다. 다만, 제43조의2에 따라 명단 공개된 체불사업주가 명단 공개 기간 중에 제36조, 제43조, 제44조, 제44조의2, 제46조, 제51조의3, 제52조제2항제2호 또는 제56조를 위반한 경우에는 그러하지 아니하다.<신설 2026. 4. 7.>\n[시행일: 2026. 10. 8.] 제107조"}, {"doc": "법령/근로기준법.md", "heading": "제108조 (벌칙)", "text": "### 제108조 (벌칙)\n근로감독관이 이 법을 위반한 사실을 고의로 묵과하면 3년 이하의 징역 또는 5년 이하의 자격정지에 처한다."}, {"doc": "법령/근로기준법.md", "heading": "제108조 (벌칙) [2026. 12. 8. 시행]", "text": "### 제108조 (벌칙) [2026. 12. 8. 시행]\n노동감독관이 이 법을 위반한 사실을 고의로 묵과하면 3년 이하의 징역 또는 5년 이하의 자격정지에 처한다. <개정 2026. 4. 7.>\n[시행일: 2026. 12. 8.] 제108조"}, {"doc": "법령/근로기준법.md", "heading": "제109조 (벌칙)", "text": "### 제109조 (벌칙)\n① 제36조, 제43조, 제44조, 제44조의2, 제46조, 제51조의3, 제52조제2항제2호, 제56조, 제65조, 제72조 또는 제76조의3제6항을 위반한 자는 3년 이하의 징역 또는 3천만원 이하의 벌금에 처한다. <개정 2007. 7. 27., 2017. 11. 28., 2019. 1. 15., 2021. 1. 5.>\n② 제36조, 제43조, 제44조, 제44조의2, 제46조, 제51조의3, 제52조제2항제2호 또는 제56조를 위반한 자에 대하여는 피해자의 명시적인 의사와 다르게 공소를 제기할 수 없다. 다만, 제43조의2에 따라 명단 공개된 체불사업주가 명단 공개 기간 중에 제36조, 제43조, 제44조, 제44조의2, 제46조, 제51조의3, 제52조제2항제2호 또는 제56조를 위반한 경우에는 그러하지 아니하다.<개정 2007. 7. 27., 2021. 1. 5., 2024. 10. 22.>"}, {"doc": "법령/근로기준법.md", "heading": "제109조 (벌칙) [2026. 10. 8. 시행]", "text": "### 제109조 (벌칙) [2026. 10. 8. 시행]\n① 제65조, 제72조 또는 제76조의3제6항을 위반한 자는 3년 이하의 징역 또는 3천만원 이하의 벌금에 처한다. <개정 2007. 7. 27., 2017. 11. 28., 2019. 1. 15., 2021. 1. 5., 2026. 4. 7.>\n② 삭제<2026. 4. 7.>\n[시행일: 2026. 10. 8.] 제109조"}, {"doc": "법령/근로기준법.md", "heading": "제110조 (벌칙)", "text": "### 제110조 (벌칙)\n다음 각 호의 어느 하나에 해당하는 자는 2년 이하의 징역 또는 2천만원 이하의 벌금에 처한다. <개정 2009. 5. 21., 2012. 2. 1., 2017. 11. 28., 2018. 3. 20., 2021. 1. 5.>\n1. 제10조, 제22조제1항, 제26조, 제50조, 제51조의2제2항, 제52조제2항제1호, 제53조제1항ㆍ제2항, 같은 조 제4항 본문ㆍ제7항, 제54조, 제55조, 제59조제2항, 제60조제1항ㆍ제2항ㆍ제4항 및 제5항, 제64조제1항, 제69조, 제70조제1항ㆍ제2항, 제71조, 제74조제1항부터 제5항까지, 제75조, 제78조부터 제80조까지, 제82조, 제83조 및 제104조제2항을 위반한 자\n2. 제53조제5항에 따른 명령을 위반한 자"}, {"doc": "법령/근로기준법.md", "heading": "제110조 (벌칙) [2026. 12. 8. 시행]", "text": "### 제110조 (벌칙) [2026. 12. 8. 시행]\n다음 각 호의 어느 하나에 해당하는 자는 2년 이하의 징역 또는 2천만원 이하의 벌금에 처한다. <개정 2009. 5. 21., 2012. 2. 1., 2017. 11. 28., 2018. 3. 20., 2021. 1. 5., 2026. 4. 7.>\n1. 제10조, 제22조제1항, 제26조, 제50조, 제51조의2제2항, 제52조제2항제1호, 제53조제1항ㆍ제2항, 같은 조 제4항 본문ㆍ제7항, 제54조, 제55조, 제59조제2항, 제60조제1항ㆍ제2항ㆍ제4항 및 제5항, 제64조제1항, 제69조, 제70조제1항ㆍ제2항, 제71조, 제74조제1항부터 제5항까지, 제75조, 제78조부터 제80조까지, 제82조, 제83조 및 제104조을 위반한 자\n2. 제53조제5항에 따른 명령을 위반한 자\n[시행일: 2026. 12. 8.] 제110조제1호"}, {"doc": "법령/근로기준법.md", "heading": "제111조 (벌칙)", "text": "### 제111조 (벌칙)\n제31조제3항에 따라 확정되거나 행정소송을 제기하여 확정된 구제명령 또는 구제명령을 내용으로 하는 재심판정을 이행하지 아니한 자는 1년 이하의 징역 또는 1천만원 이하의 벌금에 처한다."}, {"doc": "법령/근로기준법.md", "heading": "제112조 (고발)", "text": "### 제112조 (고발)\n① 제111조의 죄는 노동위원회의 고발이 있어야 공소를 제기할 수 있다.\n② 검사는 제1항에 따른 죄에 해당하는 위반행위가 있음을 노동위원회에 통보하여 고발을 요청할 수 있다."}, {"doc": "법령/근로기준법.md", "heading": "제113조 (벌칙)", "text": "### 제113조 (벌칙)\n제45조를 위반한 자는 1천만원 이하의 벌금에 처한다."}, {"doc": "법령/근로기준법.md", "heading": "제114조 (벌칙)", "text": "### 제114조 (벌칙)\n다음 각 호의 어느 하나에 해당하는 자는 500만원 이하의 벌금에 처한다. <개정 2007. 7. 27., 2008. 3. 28., 2009. 5. 21., 2012. 2. 1., 2018. 3. 20.>\n1. 제6조, 제16조, 제17조, 제20조, 제21조, 제22조제2항, 제47조, 제53조제4항 단서, 제67조제1항ㆍ제3항, 제70조제3항, 제73조, 제74조제6항, 제77조, 제94조, 제95조, 제100조 및 제103조를 위반한 자\n2. 제96조제2항에 따른 명령을 위반한 자"}, {"doc": "법령/근로기준법.md", "heading": "제114조 (벌칙) [2026. 12. 8. 시행]", "text": "### 제114조 (벌칙) [2026. 12. 8. 시행]\n다음 각 호의 어느 하나에 해당하는 자는 500만원 이하의 벌금에 처한다. <개정 2007. 7. 27., 2008. 3. 28., 2009. 5. 21., 2012. 2. 1., 2018. 3. 20., 2026. 4. 7.>\n1. 제6조, 제16조, 제17조, 제20조, 제21조, 제22조제2항, 제47조, 제53조제4항 단서, 제67조제1항ㆍ제3항, 제70조제3항, 제73조, 제74조제6항, 제77조, 제94조, 제95조 및 제100조를 위반한 자\n2. 제96조제2항에 따른 명령을 위반한 자\n[시행일: 2026. 12. 8.] 제114조제1호"}, {"doc": "법령/근로기준법.md", "heading": "제115조 (양벌규정)", "text": "### 제115조 (양벌규정)\n사업주의 대리인, 사용인, 그 밖의 종업원이 해당 사업의 근로자에 관한 사항에 대하여 제107조, 제109조부터 제111조까지, 제113조 또는 제114조의 위반행위를 하면 그 행위자를 벌하는 외에 그 사업주에게도 해당 조문의 벌금형을 과(科)한다. 다만, 사업주가 그 위반행위를 방지하기 위하여 해당 업무에 관하여 상당한 주의와 감독을 게을리하지 아니한 경우에는 그러하지 아니하다.\n[전문개정 2009. 5. 21.]"}, {"doc": "법령/근로기준법.md", "heading": "제116조 (과태료)", "text": "### 제116조 (과태료)\n① 사용자(사용자의 「민법」 제767조에 따른 친족 중 대통령령으로 정하는 사람이 해당 사업 또는 사업장의 근로자인 경우를 포함한다)가 제76조의2를 위반하여 직장 내 괴롭힘을 한 경우에는 1천만원 이하의 과태료를 부과한다. <신설 2021. 4. 13.>\n② 다음 각 호의 어느 하나에 해당하는 자에게는 500만원 이하의 과태료를 부과한다.<개정 2009. 5. 21., 2010. 6. 4., 2014. 3. 24., 2017. 11. 28., 2021. 1. 5., 2021. 4. 13., 2021. 5. 18.>\n1. 제13조에 따른 고용노동부장관, 노동위원회 또는 근로감독관의 요구가 있는 경우에 보고 또는 출석을 하지 아니하거나 거짓된 보고를 한 자\n2. 제14조, 제39조, 제41조, 제42조, 제48조, 제66조, 제74조제7항ㆍ제9항, 제76조의3제2항ㆍ제4항ㆍ제5항ㆍ제7항, 제91조, 제93조, 제98조제2항 및 제99조를 위반한 자\n3. 제51조의2제5항에 따른 임금보전방안을 신고하지 아니한 자\n4. 제102조에 따른 근로감독관 또는 그 위촉을 받은 의사의 현장조사나 검진을 거절, 방해 또는 기피하고 그 심문에 대하여 진술을 하지 아니하거나 거짓된 진술을 하며 장부ㆍ서류를 제출하지 아니하거나 거짓 장부ㆍ서류를 제출한 자\n③ 제1항 및 제2항에 따른 과태료는 대통령령으로 정하는 바에 따라 고용노동부장관이 부과ㆍ징수한다.<개정 2010. 6. 4., 2021. 4. 13.>\n④ 삭제<2009. 5. 21.>\n⑤ 삭제<2009. 5. 21.>"}, {"doc": "법령/근로기준법.md", "heading": "제116조 (과태료) [2027. 1. 1. 시행] [2026. 10. 8. 시행]", "text": "### 제116조 (과태료) [2027. 1. 1. 시행] [2026. 10. 8. 시행]\n① 다음 각 호의 어느 하나에 해당하는 경우에는 1천만원 이하의 과태료를 부과한다. <신설 2021. 4. 13., 2026. 4. 7.>\n1. 사용자(사용자의 「민법」 제767조에 따른 친족 중 대통령령으로 정하는 사람이 해당 사업 또는 사업장의 근로자인 경우를 포함한다)가 제76조의2를 위반하여 직장 내 괴롭힘을 한 경우\n2. 수급인이 제44조의4제6항을 위반하여 같은 조 제1항에 따라 지급받은 임금비용을 자신의 근로자에 대한 임금 지급 이외의 다른 용도로 사용한 경우\n② 다음 각 호의 어느 하나에 해당하는 자에게는 500만원 이하의 과태료를 부과한다.<개정 2009. 5. 21., 2010. 6. 4., 2014. 3. 24., 2017. 11. 28., 2021. 1. 5., 2021. 4. 13., 2021. 5. 18.>\n1. 제13조에 따른 고용노동부장관, 노동위원회 또는 근로감독관의 요구가 있는 경우에 보고 또는 출석을 하지 아니하거나 거짓된 보고를 한 자\n2. 제14조, 제39조, 제41조, 제42조, 제48조, 제66조, 제74조제7항ㆍ제9항, 제76조의3제2항ㆍ제4항ㆍ제5항ㆍ제7항, 제91조, 제93조, 제98조제2항 및 제99조를 위반한 자\n3. 제51조의2제5항에 따른 임금보전방안을 신고하지 아니한 자\n4. 제102조에 따른 근로감독관 또는 그 위촉을 받은 의사의 현장조사나 검진을 거절, 방해 또는 기피하고 그 심문에 대하여 진술을 하지 아니하거나 거짓된 진술을 하며 장부ㆍ서류를 제출하지 아니하거나 거짓 장부ㆍ서류를 제출한 자\n③ 제1항 및 제2항에 따른 과태료는 대통령령으로 정하는 바에 따라 고용노동부장관이 부과ㆍ징수한다.<개정 2010. 6. 4., 2021. 4. 13.>\n④ 삭제<2009. 5. 21.>\n⑤ 삭제<2009. 5. 21.>\n[시행일: 2027. 1. 1.] 제116조제1항제2호\n[시행일: 2026. 10. 8.] 제116조"}, {"doc": "법령/근로기준법.md", "heading": "제1조 (시행일)", "text": "### 제1조 (시행일)\n이 법은 공포 후 6개월이 경과한 날부터 시행한다."}, {"doc": "법령/근로기준법.md", "heading": "제2조 (다른 법률의 개정)", "text": "### 제2조 (다른 법률의 개정)\n근로기준법 일부를 다음과 같이 개정한다.\n제60조제6항제3호 중 “「남녀고용평등과 일ㆍ가정 양립 지원에 관한 법률」 제19조제1항”을 “「남녀고용평등과 일ㆍ가정 양립 지원에 관한 법률」 제19조”로 한다.\n\n근로기준법\n\n법제처\n\n국가법령정보센터"}, {"doc": "인사/보상복리후생규정.md", "heading": "(머리말)", "text": "# 보상·복리후생규정 (Compensation & Benefits Regulation)\n\n- **분류:** A-2 / 조직·인사\n- **레벨:** 전사(全社) 공통\n- **주관부서:** 인사팀 (Total Rewards)\n- **승인:** 대표이사\n- **상위문서:** [규정체계도](../00_규정체계도.md) / [인사규정](인사규정.md)\n\n---"}, {"doc": "인사/보상복리후생규정.md", "heading": "제1조 (목적)", "text": "### 제1조 (목적)\n본 규정은 임직원의 보상(급여·상여·수당)과 복리후생에 관한 기준을 정하여, 보상의 공정성·경쟁력을 확보하고 직원의 생활안정과 동기부여를 도모함을 목적으로 한다."}, {"doc": "인사/보상복리후생규정.md", "heading": "제2조 (보상의 구성)", "text": "### 제2조 (보상의 구성)\n회사의 총보상(Total Rewards)은 다음으로 구성한다.\n\n```\n총보상 (Total Rewards)\n├── 1. 금전적 보상 (Cash)\n│   ├── 기본급 (Base Salary)\n│   ├── 제수당 (Allowances)\n│   └── 성과급 (Incentive/Bonus)\n└── 2. 복리후생 (Benefits)\n    ├── 법정 복리후생 (4대보험 등)\n    └── 법정외 복리후생 (선택적 복지 등)\n```\n\n---"}, {"doc": "인사/보상복리후생규정.md", "heading": "제3조 (급여체계)", "text": "### 제3조 (급여체계)\n① 급여는 **연봉제**를 기본으로 하며, 12분할하여 월 지급한다.\n② 직급·직무·역량에 따른 연봉 밴드(Pay Band)를 운영한다.\n\n| 직급 | 연봉 밴드(예시, 백만원) |\n|------|------------------------|\n| 사원 | 38 ~ 46 |\n| 대리 | 45 ~ 58 |\n| 과장 | 56 ~ 72 |\n| 차장 | 70 ~ 90 |\n| 부장 | 88 ~ 120 |"}, {"doc": "인사/보상복리후생규정.md", "heading": "제4조 (급여 지급)", "text": "### 제4조 (급여 지급)\n① 급여 지급일은 매월 **25일**(휴일인 경우 직전 영업일)로 한다.\n② 신규입사·퇴직 시 일할 계산한다."}, {"doc": "인사/보상복리후생규정.md", "heading": "제5조 (제수당)", "text": "### 제5조 (제수당)\n| 수당 | 지급 기준 |\n|------|-----------|\n| 직책수당 | 팀장 30만원 / 본부장 60만원 (월) |\n| 연장·야간·휴일수당 | 근로기준법에 따라 통상임금 기준 가산 지급 |\n| 식대 | 월 20만원 (비과세 한도 적용) |\n\n---"}, {"doc": "인사/보상복리후생규정.md", "heading": "제6조 (성과급 종류)", "text": "### 제6조 (성과급 종류)\n① **개인성과급(PI)**: 개인 인사평가 등급에 연동.\n② **회사성과급(PS)**: 회사·사업부 경영실적(영업이익 목표 달성률) 연동."}, {"doc": "인사/보상복리후생규정.md", "heading": "제7조 (개인성과급 지급률)", "text": "### 제7조 (개인성과급 지급률)\n인사평가 등급별 기본급(월) 대비 지급 배수.\n\n| 평가등급 | S | A | B | C | D |\n|----------|---|---|---|---|---|\n| 지급배수 | 400% | 300% | 200% | 100% | 0% |"}, {"doc": "인사/보상복리후생규정.md", "heading": "제8조 (회사성과급)", "text": "### 제8조 (회사성과급)\n영업이익 목표 달성률에 따라 이사회 결의로 재원을 확정하고, 사업부별 기여도를 반영하여 배분한다.\n\n---"}, {"doc": "인사/보상복리후생규정.md", "heading": "제9조 (법정 복리후생)", "text": "### 제9조 (법정 복리후생)\n국민연금·건강보험·고용보험·산재보험 및 퇴직급여를 법령에 따라 운영한다."}, {"doc": "인사/보상복리후생규정.md", "heading": "제10조 (법정외 복리후생)", "text": "### 제10조 (법정외 복리후생)\n| 항목 | 내용 |\n|------|------|\n| 선택적 복지포인트 | 연 120만 포인트 (직급별 차등 가능) |\n| 경조금·경조휴가 | 본인 결혼 5일·100만원 / 직계가족 사망 5일·100만원 등 |\n| 건강검진 | 만 35세 이상 종합검진 연 1회 지원 |\n| 자기계발 | 직무 관련 교육·도서 연 50만원 한도 |\n| 장기근속 포상 | 5/10/15/20년 단위 포상금·휴가 |"}, {"doc": "인사/보상복리후생규정.md", "heading": "제11조 (경조사 기준표)", "text": "### 제11조 (경조사 기준표)\n| 구분 | 휴가일수 | 경조금 |\n|------|----------|--------|\n| 본인 결혼 | 5일 | 1,000,000원 |\n| 자녀 결혼 | 1일 | 500,000원 |\n| 배우자·본인 부모 사망 | 5일 | 1,000,000원 |\n| 배우자 부모 사망 | 3일 | 500,000원 |\n| 자녀 출산(배우자) | 10일 | 500,000원 |\n\n---"}, {"doc": "인사/보상복리후생규정.md", "heading": "제12조 (퇴직급여제도)", "text": "### 제12조 (퇴직급여제도)\n① 회사는 **확정기여형(DC)** 퇴직연금제도를 운영한다.\n② 매년 연간 임금총액의 1/12 이상을 근로자 계정에 납입한다.\n\n---"}, {"doc": "인사/보상복리후생규정.md", "heading": "부칙", "text": "## 부칙\n1. (시행일) 본 규정은 2026년 7월 1일부터 시행한다.\n2. (지급률 조정) 성과급 지급배수·복지포인트는 매년 경영환경에 따라 조정할 수 있다."}, {"doc": "인사/보상복리후생규정.md", "heading": "제·개정 이력", "text": "### 제·개정 이력\n| 버전 | 일자 | 내용 | 승인 |\n|------|------|------|------|\n| 1.0 | 2026-06-24 | 제정 (예시) | 대표이사 |\n\n---\n\n*※ 본 문서는 예시(샘플)이며, 금액·지급률은 가상의 수치입니다.*"}, {"doc": "인사/인사규정.md", "heading": "(머리말)", "text": "# 인사규정 (Human Resources Regulation)\n\n- **분류:** A-1 / 조직·인사\n- **레벨:** 전사(全社) 공통\n- **주관부서:** 인사팀 (People & Culture)\n- **승인:** 대표이사\n- **상위문서:** [규정체계도](../00_규정체계도.md)\n\n---"}, {"doc": "인사/인사규정.md", "heading": "제1조 (목적)", "text": "### 제1조 (목적)\n본 규정은 회사 임직원의 채용·배치·평가·승진·교육·퇴직 등 인사관리 전반에 관한 기본 사항을 정하여, 공정하고 합리적인 인사운영을 도모함을 목적으로 한다."}, {"doc": "인사/인사규정.md", "heading": "제2조 (적용범위)", "text": "### 제2조 (적용범위)\n① 본 규정은 회사에 근무하는 모든 정규직 임직원에게 적용한다.\n② 계약직·인턴·파견근로자 등은 개별 계약 또는 별도 지침이 우선하며, 본 규정을 준용한다."}, {"doc": "인사/인사규정.md", "heading": "제3조 (용어의 정의)", "text": "### 제3조 (용어의 정의)\n1. **직원**: 회사와 근로계약을 체결한 자.\n2. **직급(Job Grade)**: 직무 수행 능력과 책임의 수준에 따른 등급.\n3. **직책(Position)**: 조직상 부여된 보직(팀장, 본부장 등).\n4. **인사위원회**: 주요 인사사항을 심의·의결하는 기구."}, {"doc": "인사/인사규정.md", "heading": "제4조 (인사관리 원칙)", "text": "### 제4조 (인사관리 원칙)\n- **적재적소(適材適所)**: 직무와 역량에 부합하는 배치\n- **공정성**: 채용·평가·보상의 객관적 기준 적용\n- **다양성·비차별**: 성별·연령·출신 등에 따른 차별 금지\n\n---"}, {"doc": "인사/인사규정.md", "heading": "제5조 (채용원칙)", "text": "### 제5조 (채용원칙)\n① 채용은 공개경쟁을 원칙으로 하며, 직무에 필요한 역량을 기준으로 선발한다.\n② 필요 시 수시·특별채용(경력직, 추천채용)을 운영할 수 있다."}, {"doc": "인사/인사규정.md", "heading": "제6조 (채용 결재권)", "text": "### 제6조 (채용 결재권)\n채용 인원 및 직급에 따른 결재권은 [전사 전결규정](../전결규정/전사_전결규정.md)의 인사 항목을 따른다.\n\n| 구분 | 전결권자 |\n|------|----------|\n| 사원~대리 채용 | 본부장 |\n| 과장~차장 채용 | 부문장 |\n| 부장 이상 / 임원 채용 | 대표이사 |"}, {"doc": "인사/인사규정.md", "heading": "제7조 (수습기간)", "text": "### 제7조 (수습기간)\n① 신규 채용자의 수습기간은 **3개월**로 한다.\n② 수습기간 중 업무수행이 현저히 부적합한 경우 본채용을 거부할 수 있다.\n\n---"}, {"doc": "인사/인사규정.md", "heading": "제8조 (배치 및 전환)", "text": "### 제8조 (배치 및 전환)\n직원의 부서 배치·전환은 업무상 필요와 본인의 역량·경력개발을 고려하여 결정한다."}, {"doc": "인사/인사규정.md", "heading": "제9조 (인사평가)", "text": "### 제9조 (인사평가)\n① 평가는 **연 2회**(상·하반기) 실시한다.\n② 평가는 **업적평가(성과)**와 **역량평가(행동)**로 구성한다.\n③ 평가등급은 5단계(S/A/B/C/D)로 하며 상대평가를 원칙으로 한다.\n\n| 등급 | S | A | B | C | D |\n|------|---|---|---|---|---|\n| 권장 배분율 | 10% | 20% | 40% | 20% | 10% |"}, {"doc": "인사/인사규정.md", "heading": "제10조 (승진)", "text": "### 제10조 (승진)\n① 승진은 인사평가 결과, 근속, 역량검증을 종합하여 결정한다.\n② 직급별 표준 체류연한은 다음과 같다(역량 우수자는 발탁승진 가능).\n\n| 직급 | 표준 체류연한 |\n|------|---------------|\n| 사원 → 대리 | 4년 |\n| 대리 → 과장 | 4년 |\n| 과장 → 차장 | 5년 |\n| 차장 → 부장 | 5년 |\n\n---"}, {"doc": "인사/인사규정.md", "heading": "제11조 (근무시간)", "text": "### 제11조 (근무시간)\n① 주 40시간, 1일 8시간 근무를 원칙으로 한다.\n② 선택적 근로시간제·재택근무는 별도 지침으로 정한다."}, {"doc": "인사/인사규정.md", "heading": "제12조 (휴가)", "text": "### 제12조 (휴가)\n① 연차유급휴가는 근로기준법에 따라 부여한다.\n② 경조사 휴가, 병가 등은 별도 [복리후생 기준](보상복리후생규정.md)을 따른다.\n\n---"}, {"doc": "인사/인사규정.md", "heading": "제13조 (교육훈련)", "text": "### 제13조 (교육훈련)\n회사는 직무역량 향상을 위한 교육체계(리더십/직무/법정의무 교육)를 운영한다."}, {"doc": "인사/인사규정.md", "heading": "제14조 (퇴직)", "text": "### 제14조 (퇴직)\n① 퇴직은 정년퇴직, 의원퇴직, 권고사직, 징계해고로 구분한다.\n② 정년은 만 **60세**로 한다.\n③ 퇴직금은 [보상복리후생규정](보상복리후생규정.md) 및 퇴직급여법에 따른다.\n\n---"}, {"doc": "인사/인사규정.md", "heading": "제15조 (포상)", "text": "### 제15조 (포상)\n회사 발전에 기여한 직원에게 표창·포상금을 수여할 수 있다."}, {"doc": "인사/인사규정.md", "heading": "제16조 (징계)", "text": "### 제16조 (징계)\n① 징계의 종류: 견책 → 감봉 → 정직 → 강등 → 해고\n② 징계는 인사위원회의 심의를 거쳐 결정한다.\n\n---"}, {"doc": "인사/인사규정.md", "heading": "부칙", "text": "## 부칙\n1. (시행일) 본 규정은 2026년 7월 1일부터 시행한다.\n2. (경과조치) 시행 전 진행 중인 인사절차는 종전 규정에 따른다."}, {"doc": "인사/인사규정.md", "heading": "제·개정 이력", "text": "### 제·개정 이력\n| 버전 | 일자 | 내용 | 승인 |\n|------|------|------|------|\n| 1.0 | 2026-06-24 | 제정 (예시) | 대표이사 |\n\n---\n\n*※ 본 문서는 예시(샘플)이며, 실제 적용 시 노동관계법령 및 취업규칙과의 정합성 검토가 필요합니다.*"}], "faq": [{"category": "인사/평가", "question": "인사평가는 1년에 몇 번 하나요?", "answer": "연 2회(상·하반기) 실시하며, 업적평가(성과)와 역량평가(행동)로 구성되고 S/A/B/C/D 5단계 상대평가입니다.", "source": "인사/인사규정.md › 제9조 (인사평가)"}, {"category": "인사/근무", "question": "정년은 몇 세인가요?", "answer": "정년은 만 60세입니다. (인사규정 제14조)", "source": "인사/인사규정.md › 제14조 (퇴직)"}, {"category": "보상/급여", "question": "급여는 매월 언제 지급되나요?", "answer": "매월 25일에 지급하며, 지급일이 휴일인 경우 직전 영업일에 지급합니다.", "source": "인사/보상복리후생규정.md › 제4조 (급여 지급)"}, {"category": "보상/성과급", "question": "인사평가 S등급을 받으면 개인성과급이 얼마인가요?", "answer": "개인성과급은 기본급(월) 대비 S등급 400%, A 300%, B 200%, C 100%, D 0% 지급배수가 적용됩니다.", "source": "인사/보상복리후생규정.md › 제7조 (개인성과급 지급률)"}, {"category": "복리후생", "question": "본인 결혼 시 경조휴가와 경조금은 어떻게 되나요?", "answer": "본인 결혼은 휴가 5일, 경조금 100만원입니다. (보상복리후생규정 제11조 경조사 기준표)", "source": "인사/보상복리후생규정.md › 제11조 (경조사 기준표)"}, {"category": "근로기준법/휴가", "question": "연차휴가는 며칠 발생하나요?", "answer": "1년간 80% 이상 출근하면 15일의 유급휴가가 발생합니다. 근속 1년 미만이거나 출근율 80% 미만이면 1개월 개근 시 1일씩 발생합니다. 3년 이상 계속 근로하면 최초 1년을 초과하는 매 2년마다 1일이 가산되며, 총 휴가일수는 25일을 한도로 합니다.", "source": "법령/근로기준법.md › 제60조 (연차 유급휴가)"}, {"category": "근로기준법/근로시간", "question": "법정 근로시간은 어떻게 되나요?", "answer": "휴게시간을 제외하고 1주 40시간, 1일 8시간을 초과할 수 없습니다.", "source": "법령/근로기준법.md › 제50조 (근로시간)"}, {"category": "근로기준법/근로시간", "question": "연장근로는 주 몇 시간까지 가능한가요?", "answer": "당사자 간 합의가 있으면 1주 12시간을 한도로 연장할 수 있습니다. (법정 40시간 + 연장 12시간)", "source": "법령/근로기준법.md › 제53조 (연장 근로의 제한)"}, {"category": "근로기준법/근로시간", "question": "휴게시간은 얼마나 주어야 하나요?", "answer": "근로시간이 4시간인 경우 30분 이상, 8시간인 경우 1시간 이상의 휴게시간을 근로시간 도중에 주어야 하며, 휴게시간은 근로자가 자유롭게 이용할 수 있습니다.", "source": "법령/근로기준법.md › 제54조 (휴게)"}, {"category": "근로기준법/휴일", "question": "주휴일은 어떻게 보장되나요?", "answer": "사용자는 근로자에게 1주에 평균 1회 이상의 유급휴일을 보장해야 합니다.", "source": "법령/근로기준법.md › 제55조 (휴일)"}, {"category": "근로기준법/모성보호", "question": "출산전후휴가는 며칠인가요?", "answer": "출산 전후를 통하여 90일(미숙아 100일, 둘 이상 자녀를 임신한 경우 120일)의 출산전후휴가가 주어지며, 휴가 기간의 배정은 출산 후에 45일(둘 이상 자녀는 60일) 이상이 되어야 합니다.", "source": "법령/근로기준법.md › 제74조 (임산부의 보호)"}]}</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const DATA=JSON.parse(document.getElementById('appdata').textContent);
const EXAMPLES=["연차휴가 며칠 발생해?","법정 근로시간 얼마야?","배우자 출산 시 경조휴가는?","급여는 언제 지급돼?","인사평가 S등급 성과급은?","정년은 몇 세야?"];
function norm(t){return t.replace(/[^0-9A-Za-z가-힣]+/g,' ').toLowerCase();}
function bigrams(t){t=norm(t).replace(/ /g,'');const s=new Set();if(t.length<2){s.add(t);return s;}for(let i=0;i<t.length-1;i++)s.add(t.slice(i,i+2));return s;}
function toks(t){return new Set(norm(t).split(' ').filter(w=>w.length>=2));}
function inter(a,b){let n=0;for(const x of a)if(b.has(x))n++;return n;}
function textSim(a,b){const ab=bigrams(a),bb=bigrams(b),at=toks(a),bt=toks(b);return inter(ab,bb)/(ab.size||1)*0.5+inter(at,bt)/(at.size||1)*0.5;}
function scoreChunk(q,c){const qb=bigrams(q),cb=bigrams(c.text);const bo=inter(qb,cb)/(qb.size||1);const qt=toks(q),ct=toks(c.text+' '+c.heading);const to=inter(qt,ct)/(qt.size||1);const hh=inter(toks(q),toks(c.heading))*0.15;return bo*0.5+to*0.5+hh;}
function search(q,k){const sc=DATA.chunks.map(c=>[c,scoreChunk(q,c)]);sc.sort((a,b)=>b[1]-a[1]);return sc.slice(0,k).filter(x=>x[1]>0);}
function bestFaq(q){let best=null,bs=0;for(const it of DATA.faq){const s=textSim(q,it.question);if(s>bs){bs=s;best=it;}}return [best,bs];}
function compute(q){
  const res=search(q,4);
  const sources=res.map(([c,s])=>({source:c.doc+' › '+c.heading,score:Math.round(s*1000)/1000,text:c.text}));
  const [item,fs]=bestFaq(q);const ts=res.length?res[0][1]:0;
  if(item&&fs>=0.25)return {kind:'faq',answer:item.answer,answer_source:item.source,sources};
  if(res.length&&ts>=0.10)return {kind:'excerpt',answer:res[0][0].text,answer_source:res[0][0].doc+' › '+res[0][0].heading,sources};
  return {kind:'none',answer:'문의하신 내용은 인사관리(근태·공수·복지) FAQ 범위에서 확인되지 않습니다. 관련 담당 부서에 문의하세요.',answer_source:null,sources:[]};
}
const chat=document.getElementById('chat'),form=document.getElementById('form'),qInput=document.getElementById('q'),sendBtn=form.querySelector('button');
const exWrap=document.getElementById('examples');
EXAMPLES.forEach(t=>{const b=document.createElement('button');b.className='chip';b.type='button';b.textContent=t;b.onclick=()=>{qInput.value=t;form.requestSubmit();};exWrap.appendChild(b);});
function md(t){if(window.marked)return marked.parse(t);const d=document.createElement('div');d.textContent=t;return '<pre style="white-space:pre-wrap;font-family:inherit">'+d.innerHTML+'</pre>';}
function el(h){const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function scroll(){window.scrollTo(0,document.body.scrollHeight);}
function addUser(t){chat.appendChild(el('<div class="msg user"><div class="bubble">'+esc(t)+'</div></div>'));scroll();}
function addLoading(){const n=el('<div class="msg bot"><div class="card"><div class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span> 검색 중…</div></div></div>');chat.appendChild(n);scroll();return n;}
function render(r){
  let s='';
  if(r.kind==='excerpt')s+='<div class="kind-excerpt">정확히 일치하는 FAQ가 없어, 가장 관련 높은 규정 조문을 안내합니다.</div>';
  s+='<div class="answer">'+md(r.answer||'')+'</div>';
  if(r.answer_source)s+='<div class="src">출처: <b>'+esc(r.answer_source)+'</b></div>';
  if(r.sources&&r.sources.length){
    const items=r.sources.map(x=>'<div class="src-item"><div class="meta">('+x.score+') '+esc(x.source)+'</div><pre>'+esc(x.text)+'</pre></div>').join('');
    s+='<details><summary>📚 관련 근거 조문 '+r.sources.length+'개</summary>'+items+'</details>';
  }
  s+='<div class="note">※ 이 공유 데모는 FAQ·규정 검색으로 동작합니다. 여러 조문을 종합한 생성형 답변·검증은 API 연결 버전에서 제공됩니다.</div>';
  return el('<div class="msg bot"><div class="card">'+s+'</div></div>');
}
function ask(q){
  addUser(q);qInput.value='';sendBtn.disabled=true;
  const loading=addLoading();
  setTimeout(()=>{loading.remove();chat.appendChild(render(compute(q)));sendBtn.disabled=false;scroll();qInput.focus();},250);
}
form.addEventListener('submit',e=>{e.preventDefault();const q=qInput.value.trim();if(q)ask(q);});
</script>
</body>
</html>
